<script>
// Wait for React to load, then load Babel and compile
function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = cb;
  s.onerror = function() {
    document.getElementById('loading').innerHTML = '<div style="padding:20px;text-align:center"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:16px;margin-bottom:8px">読み込みに失敗しました</div><div style="font-size:13px;color:#64748b">インターネット接続を確認して<br>ページを再読み込みしてください</div><br><button onclick="location.reload()" style="padding:10px 24px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-size:14px;cursor:pointer">再読み込み</button></div>';
  };
  document.head.appendChild(s);
}
loadScript('https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.24.7/babel.min.js', function() {
  // Create and execute the babel script
  var appScript = document.getElementById('app-source');
  if (appScript && window.Babel) {
    try {
      var code = Babel.transform(appScript.textContent, {presets: ['react']}).code;
      var fn = new Function(code);
      fn();
      var el = document.getElementById('loading');
      if (el) el.style.display = 'none';
    } catch(e) {
      console.error(e);
      document.getElementById('loading').innerHTML = '<div style="padding:20px;text-align:center"><div style="font-size:48px;margin-bottom:16px">⚠️</div><div style="font-size:14px;color:#ef4444">エラー: ' + e.message + '</div><br><button onclick="location.reload()" style="padding:10px 24px;border-radius:8px;border:none;background:#3b82f6;color:#fff;font-size:14px;cursor:pointer">再読み込み</button></div>';
    }
  }
});
</script>
<script type="text/plain" id="app-source">
const {useState,useRef,useCallback,useEffect}=React;

const STORAGE_KEYS={saved:"tt_saved",logs:"tt_logs",matches:"tt_matches",presets:"tt_presets",equipment:"tt_equipment"};
function loadState(key,fallback){try{const v=localStorage.getItem(key);return v?JSON.parse(v):fallback;}catch(e){return fallback;}}
function usePersist(key,fallback){
  const [val,setVal]=useState(()=>loadState(key,fallback));
  useEffect(()=>{try{localStorage.setItem(key,JSON.stringify(val));}catch(e){}},[key,val]);
  return[val,setVal];
}


const CW=600,CH=780;
const COLORS=[{n:"赤",v:"#ef4444"},{n:"青",v:"#3b82f6"},{n:"黄",v:"#eab308"},{n:"白",v:"#ffffff"},{n:"黒",v:"#111111"}];
const WIDTHS=[2,4,6];
const TOOLS=[
  {id:"pen",icon:"✏️",label:"ペン"},{id:"cone",icon:"🔦",label:"返球範囲"},
  {id:"player",icon:"🧍",label:"選手配置"},{id:"memo",icon:"📝",label:"メモ"},
  {id:"move",icon:"✋",label:"移動"},{id:"recolor",icon:"🎨",label:"色変更"},
  {id:"eraser",icon:"🧹",label:"消しゴム"},
];

/* ── Stroke correction ── */
function pLen(pts){let l=0;for(let i=1;i<pts.length;i++)l+=Math.hypot(pts[i].x-pts[i-1].x,pts[i].y-pts[i-1].y);return l;}
function eDist(pts){return Math.hypot(pts[pts.length-1].x-pts[0].x,pts[pts.length-1].y-pts[0].y);}
function mDev(pts){const a=pts[0],b=pts[pts.length-1],dx=b.x-a.x,dy=b.y-a.y,ls=dx*dx+dy*dy;if(!ls)return{d:0,pt:pts[Math.floor(pts.length/2)]};let mx=0,mp=pts[0];for(let i=1;i<pts.length-1;i++){const t=Math.max(0,Math.min(1,((pts[i].x-a.x)*dx+(pts[i].y-a.y)*dy)/ls));const d=Math.hypot(pts[i].x-(a.x+t*dx),pts[i].y-(a.y+t*dy));if(d>mx){mx=d;mp=pts[i];}}return{d:mx,pt:mp};}
function correct(raw){if(raw.length<2)return null;const dd=eDist(raw),pl=pLen(raw),{d:dev,pt:cp}=mDev(raw);if(dd<10&&pl<15)return null;if((dd>0?dev/dd:0)<0.08||((pl>0?dd/pl:1)>0.95&&dev<15))return{type:"line",points:[raw[0],raw[raw.length-1]]};const mid={x:(raw[0].x+raw[raw.length-1].x)/2,y:(raw[0].y+raw[raw.length-1].y)/2};return{type:"curve",points:[raw[0],{x:mid.x+(cp.x-mid.x)*1.3,y:mid.y+(cp.y-mid.y)*1.3},raw[raw.length-1]]};}

/* ── Canvas ── */
function drawCourt(ctx){const p=40,tw=CW-p*2,th=CH-p*2,tx=p,ty=p;ctx.save();ctx.shadowColor="rgba(0,0,0,0.5)";ctx.shadowBlur=20;ctx.shadowOffsetX=6;ctx.shadowOffsetY=6;ctx.fillStyle="#2d1a0e";ctx.beginPath();ctx.roundRect(tx-6,ty-6,tw+12,th+12,6);ctx.fill();ctx.restore();ctx.fillStyle="#1a5c2e";ctx.beginPath();ctx.roundRect(tx,ty,tw,th,4);ctx.fill();ctx.strokeStyle="#fff";ctx.lineWidth=3;ctx.beginPath();ctx.roundRect(tx,ty,tw,th,4);ctx.stroke();ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(tx+tw/2,ty);ctx.lineTo(tx+tw/2,ty+th);ctx.stroke();const ny=ty+th/2;ctx.strokeStyle="#4a4a4a";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(tx-10,ny);ctx.lineTo(tx+tw+10,ny);ctx.stroke();ctx.fillStyle="#666";ctx.fillRect(tx-14,ny-6,8,12);ctx.fillRect(tx+tw+6,ny-6,8,12);ctx.strokeStyle="rgba(255,255,255,0.15)";ctx.lineWidth=1;for(let i=0;i<12;i++){const xp=tx+(tw/11)*i;ctx.beginPath();ctx.moveTo(xp,ny-3);ctx.lineTo(xp,ny+3);ctx.stroke();}ctx.fillStyle="rgba(255,255,255,0.35)";ctx.font="bold 14px 'Noto Sans JP',sans-serif";ctx.textAlign="center";ctx.fillText("相手コート",tx+tw/2,ty+th*0.2);ctx.fillText("自分コート",tx+tw/2,ty+th*0.8);}
function drawArr(ctx,fx,fy,tx,ty,sz){const a=Math.atan2(ty-fy,tx-fx);ctx.beginPath();ctx.moveTo(tx,ty);ctx.lineTo(tx-sz*Math.cos(a-Math.PI/6),ty-sz*Math.sin(a-Math.PI/6));ctx.lineTo(tx-sz*Math.cos(a+Math.PI/6),ty-sz*Math.sin(a+Math.PI/6));ctx.closePath();ctx.fill();}
function drawCone(ctx,d){const{origin:o,target:t,spread:s,color:c,opacity:op}=d;const ang=Math.atan2(t.y-o.y,t.x-o.x),dist=Math.hypot(t.x-o.x,t.y-o.y),hs=(s||40)*Math.PI/180/2;ctx.save();ctx.globalAlpha=op||0.25;ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.arc(o.x,o.y,dist,ang-hs,ang+hs);ctx.closePath();ctx.fill();ctx.restore();ctx.save();ctx.globalAlpha=Math.min((op||0.25)+0.3,0.8);ctx.strokeStyle=c;ctx.lineWidth=2;ctx.setLineDash([6,4]);ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+dist*Math.cos(ang-hs),o.y+dist*Math.sin(ang-hs));ctx.stroke();ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(o.x+dist*Math.cos(ang+hs),o.y+dist*Math.sin(ang+hs));ctx.stroke();ctx.beginPath();ctx.arc(o.x,o.y,dist,ang-hs,ang+hs);ctx.stroke();ctx.setLineDash([]);ctx.restore();ctx.save();ctx.globalAlpha=0.4;ctx.strokeStyle=c;ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(o.x,o.y);ctx.lineTo(t.x,t.y);ctx.stroke();ctx.setLineDash([]);ctx.restore();ctx.save();ctx.fillStyle=c;ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(o.x,o.y,5,0,Math.PI*2);ctx.fill();ctx.restore();}
function renderStroke(ctx,d,arrows){ctx.strokeStyle=d.color;ctx.fillStyle=d.color;ctx.lineWidth=d.width;ctx.lineCap="round";ctx.lineJoin="round";ctx.setLineDash(d.type==="curve"?[8,6]:[]);if(d.type==="line"){const[a,b]=d.points;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.stroke();if(arrows)drawArr(ctx,a.x,a.y,b.x,b.y,d.width*3);}else if(d.type==="curve"){const[a,cp,b]=d.points;ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.quadraticCurveTo(cp.x,cp.y,b.x,b.y);ctx.stroke();if(arrows)drawArr(ctx,cp.x,cp.y,b.x,b.y,d.width*3);}else if(d.type==="raw"){if(d.points.length<2)return;ctx.beginPath();ctx.moveTo(d.points[0].x,d.points[0].y);for(let i=1;i<d.points.length;i++)ctx.lineTo(d.points[i].x,d.points[i].y);ctx.stroke();if(arrows&&d.points.length>=2){const l=d.points[d.points.length-1],p2=d.points[d.points.length-2];drawArr(ctx,p2.x,p2.y,l.x,l.y,d.width*3);}}ctx.setLineDash([]);}
function drawLive(ctx,pts,col,w){if(pts.length<2)return;ctx.save();ctx.strokeStyle=col;ctx.lineWidth=w;ctx.lineCap="round";ctx.lineJoin="round";ctx.globalAlpha=0.6;ctx.beginPath();ctx.moveTo(pts[0].x,pts[0].y);for(let i=1;i<pts.length;i++)ctx.lineTo(pts[i].x,pts[i].y);ctx.stroke();ctx.restore();}
function drawPlayer(ctx,d){const{pos:p,color:c,label}=d;const r=18;ctx.save();ctx.shadowColor="rgba(0,0,0,0.4)";ctx.shadowBlur=6;ctx.shadowOffsetY=2;ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.fillStyle=c;ctx.globalAlpha=0.85;ctx.fill();ctx.restore();ctx.save();ctx.beginPath();ctx.arc(p.x,p.y,r,0,Math.PI*2);ctx.strokeStyle="#fff";ctx.lineWidth=2.5;ctx.globalAlpha=0.9;ctx.stroke();ctx.restore();ctx.save();ctx.beginPath();ctx.arc(p.x,p.y-3,r*0.55,0,Math.PI*2);ctx.fillStyle="rgba(255,255,255,0.2)";ctx.fill();ctx.restore();ctx.save();ctx.fillStyle="#fff";ctx.globalAlpha=1;ctx.font="bold 13px 'Noto Sans JP',sans-serif";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText(label||"",p.x,p.y+1);ctx.restore();}

/* ── Hit testing ── */
function dSeg(p,a,b){const dx=b.x-a.x,dy=b.y-a.y,ls=dx*dx+dy*dy;if(!ls)return Math.hypot(p.x-a.x,p.y-a.y);let t=((p.x-a.x)*dx+(p.y-a.y)*dy)/ls;t=Math.max(0,Math.min(1,t));return Math.hypot(p.x-(a.x+t*dx),p.y-(a.y+t*dy));}
function dCrv(p,pts){let m=1e9;for(let i=0;i<=30;i++){const t=i/30;const x=(1-t)**2*pts[0].x+2*(1-t)*t*pts[1].x+t**2*pts[2].x;const y=(1-t)**2*pts[0].y+2*(1-t)*t*pts[1].y+t**2*pts[2].y;m=Math.min(m,Math.hypot(p.x-x,p.y-y));}return m;}
function inCone(p,d){const{origin:o,target:t,spread:s}=d;const dist=Math.hypot(t.x-o.x,t.y-o.y);if(Math.hypot(p.x-o.x,p.y-o.y)>dist+15)return false;const a=Math.atan2(t.y-o.y,t.x-o.x),pa=Math.atan2(p.y-o.y,p.x-o.x);let df=Math.abs(pa-a);if(df>Math.PI)df=2*Math.PI-df;return df<((s||40)*Math.PI/180/2)+0.1;}
function findNearest(pos,drawings,th=25){let bi=-1,bd=th;for(let i=drawings.length-1;i>=0;i--){const d=drawings[i];let dist=1e9;if(d.type==="player")dist=Math.hypot(d.pos.x-pos.x,d.pos.y-pos.y);else if(d.type==="cone"){if(inCone(pos,d))dist=0;}else if(d.type==="line")dist=dSeg(pos,d.points[0],d.points[1]);else if(d.type==="curve")dist=dCrv(pos,d.points);else if(d.type==="raw"){for(const pt of d.points){dist=Math.min(dist,Math.hypot(pt.x-pos.x,pt.y-pos.y));}}if(dist<bd){bd=dist;bi=i;}}return bi;}
function findNearestMemo(pos,memos,th=40){let bi=-1,bd=th;for(let i=memos.length-1;i>=0;i--){
  // Check against a larger box area around memo, not just center point
  const m=memos[i],boxW=100,boxH=Math.max(30,((m.text||"").split("\n").length)*20+10);
  const dx=pos.x-m.x,dy=pos.y-m.y;
  if(dx>=-20&&dx<=boxW+20&&dy>=-20&&dy<=boxH+20){const d=Math.max(0,Math.abs(dx-boxW/2)-boxW/2)+Math.max(0,Math.abs(dy-boxH/2)-boxH/2);if(d<bd){bd=d;bi=i;}}
  else{const d=Math.hypot(pos.x-m.x,pos.y-m.y);if(d<bd){bd=d;bi=i;}}
}return bi;}
function offsetDrawing(d,dx,dy){if(d.type==="cone")return{...d,origin:{x:d.origin.x+dx,y:d.origin.y+dy},target:{x:d.target.x+dx,y:d.target.y+dy}};if(d.type==="player")return{...d,pos:{x:d.pos.x+dx,y:d.pos.y+dy}};return{...d,points:d.points.map(p=>({x:p.x+dx,y:p.y+dy}))};}

/* ── Thumbnail renderer ── */
function renderThumb(canvas,drawings,memos){
  if(!canvas)return;
  const ctx=canvas.getContext("2d");const s=canvas.width/CW;
  ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.scale(s,s);
  drawCourt(ctx);
  drawings.filter(d=>d.type==="cone").forEach(d=>drawCone(ctx,d));
  drawings.filter(d=>d.type!=="cone"&&d.type!=="player").forEach(d=>renderStroke(ctx,d,true));
  drawings.filter(d=>d.type==="player").forEach(d=>drawPlayer(ctx,d));
  // Memo dots
  memos.forEach(m=>{ctx.save();ctx.fillStyle=m.color;ctx.globalAlpha=0.8;ctx.beginPath();ctx.arc(m.x,m.y,8,0,Math.PI*2);ctx.fill();ctx.restore();});
  ctx.restore();
}
/* ── Full renderer with memo text ── */
function renderFull(canvas,drawings,memos){
  if(!canvas)return;
  const ctx=canvas.getContext("2d");const s=canvas.width/CW;
  ctx.clearRect(0,0,canvas.width,canvas.height);ctx.save();ctx.scale(s,s);
  drawCourt(ctx);
  drawings.filter(d=>d.type==="cone").forEach(d=>drawCone(ctx,d));
  drawings.filter(d=>d.type!=="cone"&&d.type!=="player").forEach(d=>renderStroke(ctx,d,true));
  drawings.filter(d=>d.type==="player").forEach(d=>drawPlayer(ctx,d));
  memos.forEach(m=>{
    ctx.save();
    const txt=m.text||"";const mLines=txt.split("\n");
    const mw=Math.min(180,Math.max(80,...mLines.map(l=>l.length*13))+20);
    const mh=mLines.length*18+14;
    ctx.fillStyle="rgba(0,0,0,0.85)";
    ctx.beginPath();ctx.roundRect(m.x-4,m.y-4,mw,mh,6);ctx.fill();
    ctx.strokeStyle=m.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(m.x-4,m.y-4,mw,mh,6);ctx.stroke();
    ctx.fillStyle=m.color;ctx.font="12px 'Noto Sans JP',sans-serif";ctx.textAlign="left";
    mLines.forEach((l,i)=>ctx.fillText(l,m.x+6,m.y+14+i*18));
    ctx.restore();
  });
  ctx.restore();
}

const bBtn={padding:"6px 10px",borderRadius:8,border:"none",cursor:"pointer",fontSize:18,color:"#e2e8f0",transition:"all 0.15s"};
const aBtn={...bBtn,background:"rgba(255,255,255,0.06)"};
const card={background:"rgba(255,255,255,0.05)",borderRadius:14,padding:20,boxShadow:"0 4px 20px rgba(0,0,0,0.2)"};
const taStyle={width:"100%",boxSizing:"border-box",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.12)",borderRadius:10,padding:"12px 14px",color:"#e2e8f0",fontSize:14,fontFamily:"inherit",lineHeight:1.8,resize:"vertical",outline:"none",minHeight:180};
const inputStyle={background:"rgba(255,255,255,0.08)",border:"1px solid rgba(255,255,255,0.15)",borderRadius:8,padding:"8px 12px",color:"#e2e8f0",fontSize:14,outline:"none",fontFamily:"inherit"};

const today=()=>new Date().toISOString().slice(0,10);

/* ════════════ MAIN APP ════════════ */
function App(){
  const [screen,setScreen]=useState("home"); // home | editor | gallery | log | equip
  const [saved,setSaved]=useState([]);
  const [logs,setLogs]=useState([]);
  const [matches,setMatches]=useState([]);
  const [presets,setPresets]=useState({locations:[],contents:[]});
  const [equipment,setEquipment]=useState({racket:"",foreRubber:"",backRubber:"",foreDate:"",backDate:"",history:[]});
  const [serveOrders,setServeOrders]=useState([]);
  const [editIdx,setEditIdx]=useState(-1); // index in saved for editing

  // Editor state
  const [title,setTitle]=useState("");
  const [drawings,setDrawings]=useState([]);
  const [memos,setMemos]=useState([]);
  const [notes,setNotes]=useState("");
  const [editorTab,setEditorTab]=useState("draw");

  const openNew=()=>{setTitle("");setDrawings([]);setMemos([]);setNotes("");setEditIdx(-1);setEditorTab("draw");setScreen("editor");};
  const openEdit=(i)=>{const t=saved[i];setTitle(t.title);setDrawings(t.drawings);setMemos(t.memos);setNotes(t.notes||"");setEditIdx(i);setEditorTab("draw");setScreen("editor");};
  const [saveMsg,setSaveMsg]=useState("");
  const saveCurrent=()=>{
    const entry={id:Date.now(),title:title||"新しい戦術",drawings:[...drawings],memos:[...memos],notes,date:today()};
    if(editIdx>=0){setSaved(p=>p.map((s,i)=>i===editIdx?entry:s));}
    else{setSaved(p=>[entry,...p]);setEditIdx(0);}
    setSaveMsg("✅ 保存しました");setTimeout(()=>setSaveMsg(""),2000);
  };
  const deleteSaved=(i)=>setSaved(p=>p.filter((_,j)=>j!==i));

  const bg={minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e293b,#0f172a)",fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif",color:"#e2e8f0",padding:16};

  return(
    <div style={bg}>
      <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>

      {screen==="home"&&<HomeScreen onNew={openNew} onGallery={()=>setScreen("gallery")} onLog={()=>setScreen("log")} onEquip={()=>setScreen("equip")} saved={saved} setSaved={setSaved} logs={logs} setLogs={setLogs} matches={matches} setMatches={setMatches} presets={presets} setPresets={setPresets} equipment={equipment} setEquipment={setEquipment} serveOrders={serveOrders} setServeOrders={setServeOrders}/>}
      {screen==="gallery"&&<GalleryScreen saved={saved} onBack={()=>setScreen("home")} onOpen={openEdit} onDelete={deleteSaved} onServeOrder={()=>setScreen("serve")}/>}
      {screen==="log"&&<LogScreen logs={logs} setLogs={setLogs} matches={matches} setMatches={setMatches} presets={presets} setPresets={setPresets} onBack={()=>setScreen("home")}/>}
      {screen==="equip"&&<EquipScreen equipment={equipment} setEquipment={setEquipment} logs={logs} onBack={()=>setScreen("home")}/>}
      {screen==="serve"&&<ServeOrderScreen saved={saved} serveOrders={serveOrders} setServeOrders={setServeOrders} onBack={()=>setScreen("gallery")}/>}
      {screen==="editor"&&(
        <>
          {/* Editor header */}
          <div style={{maxWidth:650,margin:"0 auto 6px",paddingTop:"env(safe-area-inset-top,0px)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <button onClick={()=>setScreen("home")} style={{...aBtn,fontSize:13,padding:"8px 14px",minHeight:40,flexShrink:0}}>← 戻る</button>
              <input type="text" value={title} onChange={e=>setTitle(e.target.value)}
                placeholder="タイトルを入力"
                style={{...inputStyle,flex:1,fontSize:14,fontWeight:700,textAlign:"center",minWidth:0,padding:"8px 10px"}}/>
            </div>
          </div>
          <div style={{maxWidth:650,margin:"0 auto 10px",display:"flex",justifyContent:"center",gap:4}}>

function calcRubberHours(logs,sinceDate){
  if(!sinceDate)return 0;
  return logs.filter(l=>l.date>=sinceDate).reduce((a,l)=>a+((l.hours||0)*60+(l.minutes||0)),0);
}
function calcRubberHoursPeriod(logs,fromDate,toDate){
  if(!fromDate)return 0;
  return logs.filter(l=>l.date>=fromDate&&(!toDate||l.date<toDate)).reduce((a,l)=>a+((l.hours||0)*60+(l.minutes||0)),0);
}
function HomeScreen({onNew,onGallery,onLog,onEquip,saved,setSaved,logs,setLogs,matches,setMatches,presets,setPresets,equipment,setEquipment,serveOrders,setServeOrders}){
  const totalMin=logs.reduce((a,l)=>a+((l.hours||0)*60+(l.minutes||0)),0);
  const totalH=Math.floor(totalMin/60),totalM=totalMin%60;

  const backMin=calcRubberHours(logs,equipment.backDate);
  const hasEquip=equipment.racket||equipment.foreRubber||equipment.backRubber;
  const fileRef=useRef(null);
  const [importMsg,setImportMsg]=useState("");

  const exportData=()=>{
    const data={saved,logs,matches,presets,equipment,serveOrders,exportDate:today(),version:2};
    const json=JSON.stringify(data,null,2);
    const blob=new Blob([json],{type:"application/json"});
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");
    a.href=url;a.download=`卓球ノート_${today()}.json`;a.click();
    URL.revokeObjectURL(url);
  };

  const importData=(e)=>{
    const file=e.target.files[0];
    if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{

        if(data.saved)setSaved(data.saved);
        if(data.logs)setLogs(data.logs);
        if(data.matches)setMatches(data.matches);
        if(data.presets)setPresets(data.presets);
        if(data.equipment)setEquipment(data.equipment);
        if(data.serveOrders)setServeOrders(data.serveOrders);
        setImportMsg("✅ データを読み込みました");
        setTimeout(()=>setImportMsg(""),3000);
      }catch(err){
        setImportMsg("❌ ファイルの読み込みに失敗しました");

            <div style={{fontSize:22}}>{s.icon}</div>
            <div style={{fontSize:20,fontWeight:900,margin:"4px 0"}}>{s.value}</div>

                      {Math.floor(backMin/60)}<span style={{fontSize:11,fontWeight:400}}>h</span>

                    </div>
                  </div>

              </div>
            )}
          </div>
        </div>
      )}

      {/* Menu buttons */}
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        <button onClick={onNew} style={{...card,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:14,padding:18,textAlign:"left",color:"#e2e8f0",fontSize:16,fontWeight:700,background:"linear-gradient(135deg,rgba(34,197,94,0.15),rgba(59,130,246,0.15))"}}>
          <span style={{fontSize:28}}>✏️</span>
          <div><div>新しい戦術メモを作成</div><div style={{fontSize:12,fontWeight:400,color:"#64748b",marginTop:2}}>図面と戦術ノートで戦術を記録</div></div>
        </button>
        <button onClick={onGallery} style={{...card,border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:14,padding:18,textAlign:"left",color:"#e2e8f0",fontSize:16,fontWeight:700}}>
          <span style={{fontSize:28}}>📋</span>
          <div><div>戦術メモ一覧</div><div style={{fontSize:12,fontWeight:400,color:"#64748b",marginTop:2}}>保存した{saved.length}件の戦術を確認・編集</div></div>

function EquipScreen({equipment,setEquipment,logs,onBack}){
  const [racket,setRacket]=useState(equipment.racket||"");
  const [racketNotes,setRacketNotes]=useState(equipment.racketNotes||"");
  const [foreRubber,setForeRubber]=useState(equipment.foreRubber||"");
  const [backRubber,setBackRubber]=useState(equipment.backRubber||"");
  const [foreDate,setForeDate]=useState(equipment.foreDate||today());
  const [backDate,setBackDate]=useState(equipment.backDate||today());
  const [foreThickness,setForeThickness]=useState(equipment.foreThickness||"");
  const [backThickness,setBackThickness]=useState(equipment.backThickness||"");
  const [foreNotes,setForeNotes]=useState(equipment.foreNotes||"");
  const [backNotes,setBackNotes]=useState(equipment.backNotes||"");
  const [tab,setTab]=useState("current"); // "current" | "history"

  const foreMin=calcRubberHours(logs,equipment.foreDate);
  const backMin=calcRubberHours(logs,equipment.backDate);
  const [saved,setSaved]=useState(false);

  const fmtMin=(m)=>{const h=Math.floor(m/60),mm=m%60;return h>0?(mm>0?`${h}h ${mm}m`:`${h}h`):(mm>0?`${mm}m`:"0m");};
  const fmtDays=(from,to)=>{if(!from||!to)return"";const a=new Date(from+"T00:00:00"),b=new Date(to+"T00:00:00");const d=Math.round((b-a)/(1000*60*60*24));return d>=0?`${d}日間`:"";};

  const saveEquip=()=>{
    setEquipment(prev=>{
      const hist=[...(prev.history||[])];
      // Racket changed
      if(racket!==prev.racket&&prev.racket){
        hist.unshift({side:"ラケット",rubber:prev.racket,from:prev.racketDate||prev.foreDate||"不明",to:today(),usedMin:0,type:"racket"});
      }
      // Fore: name OR date changed
      const foreChanged=(foreRubber!==prev.foreRubber||foreDate!==prev.foreDate)&&prev.foreRubber;
      if(foreChanged){
        const endDate=foreDate!==prev.foreDate?foreDate:today();
        hist.unshift({side:"フォア",rubber:prev.foreRubber,from:prev.foreDate||"不明",to:endDate,usedMin:calcRubberHoursPeriod(logs,prev.foreDate,endDate)});
      }
      // Back: name OR date changed
      const backChanged=(backRubber!==prev.backRubber||backDate!==prev.backDate)&&prev.backRubber;
      if(backChanged){
        const endDate=backDate!==prev.backDate?backDate:today();
        hist.unshift({side:"バック",rubber:prev.backRubber,from:prev.backDate||"不明",to:endDate,usedMin:calcRubberHoursPeriod(logs,prev.backDate,endDate)});
      }
      return{racket,racketNotes,foreRubber,backRubber,foreDate,backDate,foreThickness:foreThickness==="other"?"":foreThickness,backThickness:backThickness==="other"?"":backThickness,foreNotes,backNotes,racketDate:racket!==prev.racket?today():(prev.racketDate||today()),history:hist.slice(0,50)};
    });
    setSaved(true);setTimeout(()=>setSaved(false),2000);
  };

  const deleteHistory=(idx)=>{
    setEquipment(prev=>({...prev,history:(prev.history||[]).filter((_,i)=>i!==idx)}));
  };

  const history=equipment.history||[];

  return(
    <div style={{maxWidth:600,margin:"0 auto",paddingTop:"env(safe-area-inset-top,0px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:12,paddingTop:8}}>
        <button onClick={onBack} style={{...aBtn,fontSize:14,padding:"8px 16px",minHeight:40}}>← 戻る</button>
        <h2 style={{margin:0,fontSize:20,fontWeight:900}}>🏓 用具管理</h2>
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16}}>
        <button onClick={()=>setTab("current")}
          style={{...bBtn,fontSize:13,padding:"8px 18px",fontWeight:700,flex:1,
            background:tab==="current"?"rgba(34,197,94,0.3)":"rgba(255,255,255,0.06)",
            borderBottom:tab==="current"?"2px solid #22c55e":"2px solid transparent"}}>
          🏓 現在の用具
        </button>
        <button onClick={()=>setTab("history")}
          style={{...bBtn,fontSize:13,padding:"8px 18px",fontWeight:700,flex:1,
            background:tab==="history"?"rgba(139,92,246,0.25)":"rgba(255,255,255,0.06)",
            borderBottom:tab==="history"?"2px solid #a78bfa":"2px solid transparent"}}>
          📜 変更履歴{history.length>0&&` (${history.length})`}
        </button>
      </div>

      {/* ── Current tab ── */}
      {tab==="current"&&(<>
        {/* Current usage stats */}
        {(equipment.foreRubber||equipment.backRubber)&&(
          <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:16}}>
            {equipment.foreRubber&&(
              <div style={{...card,padding:14,borderLeft:"3px solid #3b82f6"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                  <div>
                    <div style={{fontSize:11,color:"#3b82f6",fontWeight:700}}>フォア面</div>

                      <span style={{fontSize:16,fontWeight:700,color:"#e2e8f0"}}>{equipment.foreRubber}</span>
                      {equipment.foreThickness&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:"rgba(59,130,246,0.15)",color:"#93c5fd"}}>{equipment.foreThickness}</span>}
                    </div>
                    {equipment.foreDate&&<div style={{fontSize:11,color:"#64748b"}}>{equipment.foreDate} 〜 ({fmtDays(equipment.foreDate,today())})</div>}
                    {equipment.foreNotes&&<div style={{fontSize:11,color:"#94a3b8",marginTop:4}}>{equipment.foreNotes}</div>}

function TacticsCard({t,onOpen,onDelete}){
  const cvRef=useRef(null);
  const [sharing,setSharing]=useState(false);
  useEffect(()=>{renderThumb(cvRef.current,t.drawings,t.memos);},[t]);

  const shareCard=async(e)=>{
    e.stopPropagation();
    setSharing(true);
    try{
      const img=generateShareImage(t.title,t.drawings,t.memos,t.notes);
      const blob=await new Promise(r=>img.toBlob(r,"image/png"));
      const file=new File([blob],(t.title||"戦術メモ")+".png",{type:"image/png"});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({title:t.title||"戦術メモ",files:[file]});
      }else{
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download=(t.title||"戦術メモ")+".png";a.click();
        URL.revokeObjectURL(url);
      }
    }catch(e){if(e.name!=="AbortError")console.error(e);}
    setSharing(false);
  };

  return(
    <div style={{...card,padding:0,overflow:"hidden",cursor:"pointer"}} onClick={onOpen}>

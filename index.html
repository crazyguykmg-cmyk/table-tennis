/* ════════════ PRACTICE LOG ════════════ */
function LogScreen({logs,setLogs,matches,setMatches,presets,setPresets,onBack}){
  const [calYear,setCalYear]=useState(()=>new Date().getFullYear());
  const [calMonth,setCalMonth]=useState(()=>new Date().getMonth());
  const [view,setView]=useState("calendar"); // "calendar" | "day"
  const [viewDate,setViewDate]=useState(null);

  const openDay=(ds)=>{setViewDate(ds);setView("day");};
  const backToCal=()=>{setView("calendar");setViewDate(null);};

  const logMap={};
  logs.forEach((l,i)=>{if(!logMap[l.date])logMap[l.date]=[];logMap[l.date].push({...l,_idx:i});});
  const matchMap={};
  matches.forEach((m,i)=>{if(!matchMap[m.date])matchMap[m.date]=[];matchMap[m.date].push({...m,_idx:i});});

  const monthKey=(y,m)=>`${y}-${String(m+1).padStart(2,"0")}`;
  const curMonthKey=monthKey(calYear,calMonth);
  const monthLogs=logs.filter(l=>l.date?.startsWith(curMonthKey));
  const monthMin=monthLogs.reduce((a,l)=>a+((l.hours||0)*60+(l.minutes||0)),0);
  const monthDays=new Set(monthLogs.map(l=>l.date)).size;
  const totalMin=logs.reduce((a,l)=>a+((l.hours||0)*60+(l.minutes||0)),0);

  const daysInMonth=new Date(calYear,calMonth+1,0).getDate();
  const firstDow=new Date(calYear,calMonth,1).getDay();
  const weeks=[];let week=new Array(firstDow).fill(null);
  for(let d=1;d<=daysInMonth;d++){week.push(d);if(week.length===7){weeks.push(week);week=[];}}
  if(week.length>0){while(week.length<7)week.push(null);weeks.push(week);}

  const prevMonth=()=>{if(calMonth===0){setCalYear(y=>y-1);setCalMonth(11);}else setCalMonth(m=>m-1);};
  const nextMonth=()=>{if(calMonth===11){setCalYear(y=>y+1);setCalMonth(0);}else setCalMonth(m=>m+1);};
  const dayStr=(d)=>`${calYear}-${String(calMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
  const todayStr=today();
  const monthNames=["1月","2月","3月","4月","5月","6月","7月","8月","9月","10月","11月","12月"];

  if(view==="day"&&viewDate){
    return <DayView date={viewDate} logs={logs} setLogs={setLogs} logMap={logMap} matches={matches} setMatches={setMatches} matchMap={matchMap} presets={presets} setPresets={setPresets} onBack={backToCal}/>;
  }

  return(
    <div style={{maxWidth:700,margin:"0 auto",paddingTop:"env(safe-area-inset-top,0px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingTop:8}}>
        <button onClick={onBack} style={{...aBtn,fontSize:14,padding:"8px 16px",minHeight:40}}>← 戻る</button>
        <h2 style={{margin:0,fontSize:20,fontWeight:900}}>📅 練習日誌</h2>
      </div>

      {/* Calendar */}
      <div style={{...card,marginBottom:16}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
          <button onClick={prevMonth} style={{...aBtn,fontSize:16,padding:"4px 12px"}}>◀</button>
          <div style={{fontSize:17,fontWeight:900}}>{calYear}年 {monthNames[calMonth]}</div>
          <button onClick={nextMonth} style={{...aBtn,fontSize:16,padding:"4px 12px"}}>▶</button>
        </div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2,marginBottom:4}}>
          {["日","月","火","水","木","金","土"].map((d,i)=>(
            <div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,padding:"4px 0",
              color:i===0?"#ef4444":i===6?"#3b82f6":"#64748b"}}>{d}</div>
          ))}
        </div>
        {weeks.map((wk,wi)=>(
          <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:2}}>
            {wk.map((d,di)=>{
              if(d===null)return <div key={di}/>;
              const ds=dayStr(d);
              const hasLog=!!logMap[ds];
              const hasMatch=!!matchMap[ds];
              const isToday=ds===todayStr;
              const dayLogs=logMap[ds]||[];
              const dayMin=dayLogs.reduce((a,l)=>a+((l.hours||0)*60+(l.minutes||0)),0);
              const cond=dayLogs.length>0?dayLogs[0].condition:null;
              return(
                <div key={di} onClick={()=>openDay(ds)}
                  style={{textAlign:"center",padding:"6px 2px",borderRadius:8,cursor:"pointer",position:"relative",minHeight:46,
                    background:isToday?"rgba(34,197,94,0.12)":"transparent",
                    border:isToday?"1px solid rgba(34,197,94,0.4)":"1px solid transparent",
                    transition:"all 0.15s"}}>
                  <div style={{fontSize:13,fontWeight:isToday?900:(hasLog||hasMatch)?700:400,
                    color:di===0?"#ef4444":di===6?"#3b82f6":(hasLog||hasMatch)?"#e2e8f0":"#475569"}}>{d}</div>
                  {hasLog&&(<div style={{marginTop:2}}>
                    <div style={{fontSize:9,color:"#94a3b8"}}>{Math.floor(dayMin/60)}h{dayMin%60>0?`${dayMin%60}m`:""}</div>
                    {cond&&<div style={{fontSize:10,marginTop:1}}>{cond}</div>}
                  </div>)}
                  <div style={{position:"absolute",bottom:3,left:"50%",transform:"translateX(-50%)",display:"flex",gap:3}}>
                    {hasLog&&<div style={{width:5,height:5,borderRadius:"50%",background:"#22c55e"}}/>}
                    {hasMatch&&<div style={{width:5,height:5,borderRadius:"50%",background:"#eab308"}}/>}
                  </div>
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Monthly summary */}
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:10,marginBottom:16}}>
        <div style={{...card,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:10,color:"#64748b"}}>今月の練習日数</div>
          <div style={{fontSize:20,fontWeight:900}}>{monthDays}<span style={{fontSize:12,fontWeight:400}}>日</span></div>
        </div>
        <div style={{...card,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:10,color:"#64748b"}}>今月の練習時間</div>
          <div style={{fontSize:20,fontWeight:900}}>{Math.floor(monthMin/60)}<span style={{fontSize:12,fontWeight:400}}>h</span>{monthMin%60>0&&<>{" "}{monthMin%60}<span style={{fontSize:12,fontWeight:400}}>m</span></>}</div>
        </div>
        <div style={{...card,padding:"10px 12px",textAlign:"center"}}>
          <div style={{fontSize:10,color:"#64748b"}}>累計練習時間</div>
          <div style={{fontSize:20,fontWeight:900}}>{Math.floor(totalMin/60)}<span style={{fontSize:12,fontWeight:400}}>h</span>{totalMin%60>0&&<>{" "}{totalMin%60}<span style={{fontSize:12,fontWeight:400}}>m</span></>}</div>
        </div>
      </div>

      {/* Month log list */}
      <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>📌 {calYear}年{monthNames[calMonth]}の記録</div>
      {monthLogs.length===0?(
        <div style={{...card,textAlign:"center",padding:24,color:"#64748b",fontSize:14}}>この月の記録はありません</div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:8}}>
          {monthLogs.map(l=>{const idx=logs.indexOf(l);return(
            <div key={l.id} onClick={()=>openDay(l.date)}
              style={{...card,padding:14,cursor:"pointer",transition:"all 0.15s"}}>
              <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                <span style={{fontSize:20}}>{l.condition||"😊"}</span>
                <span style={{fontWeight:700,fontSize:14}}>{l.date}</span>
                <span style={{fontSize:13,color:"#94a3b8"}}>{l.hours||0}h {l.minutes||0}m</span>
                {l.location&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:8,background:"rgba(139,92,246,0.12)",color:"#a78bfa",border:"1px solid rgba(139,92,246,0.2)"}}>📍 {l.location}</span>}
              </div>
              {l.content&&<div style={{fontSize:13,color:"#cbd5e1",whiteSpace:"pre-wrap",lineHeight:1.7,marginTop:4,
                overflow:"hidden",display:"-webkit-box",WebkitLineClamp:2,WebkitBoxOrient:"vertical"}}>{l.content}</div>}
            </div>
          );})}
        </div>
      )}
    </div>
  );
}

/* ════════════ DAY VIEW ════════════ */
const RUBBER_TYPES=["裏ソフト","表ソフト","粒高","アンチ","一枚","なし"];
const RACKET_TYPES=["シェーク","日ペン","中ペン"];
const defEquip=()=>({racketType:"シェーク",foreRubber:"裏ソフト",backRubber:"裏ソフト"});
const emptyMatch=()=>({id:Date.now(),opponent:"",opponent2:"",partner:"",isDoubles:false,games:[{self:0,opp:0}],result:"win",equipment:defEquip(),opponentEquip:defEquip(),partnerEquip:defEquip(),opponent2Equip:defEquip(),notes:""});

function DayView({date,logs,setLogs,logMap,matches,setMatches,matchMap,presets,setPresets,onBack}){
  const dayLogs=logMap[date]||[];
  const dayMatches=matchMap[date]||[];
  const [tab,setTab]=useState("practice");

  // Practice form
  const [hours,setHours]=useState(1);
  const [minutes,setMinutes]=useState(0);
  const [content,setContent]=useState("");
  const [condition,setCondition]=useState("😊");
  const [location,setLocation]=useState("");
  const [editLogIdx,setEditLogIdx]=useState(-1);
  const [showPresetMgr,setShowPresetMgr]=useState(false);
  const [newLocPreset,setNewLocPreset]=useState("");
  const [newContentPreset,setNewContentPreset]=useState("");

  // Match form
  const [matchList,setMatchList]=useState([emptyMatch()]);
  const [editMatchIdx,setEditMatchIdx]=useState(-1);
  const [showForm,setShowForm]=useState(true);

  const addLog=()=>{
    const entry={id:Date.now(),date,hours:Number(hours),minutes:Number(minutes),content,condition,location};
    if(editLogIdx>=0){setLogs(p=>p.map((l,i)=>i===editLogIdx?entry:l));setEditLogIdx(-1);}
    else{setLogs(p=>[entry,...p]);onBack();}
    setContent("");setHours(1);setMinutes(0);setCondition("😊");setLocation("");
  };
  const startEditLog=(idx)=>{const l=logs[idx];setHours(l.hours);setMinutes(l.minutes);setContent(l.content);setCondition(l.condition||"😊");setLocation(l.location||"");setEditLogIdx(idx);setTab("practice");};
  const deleteLog=(idx)=>{setLogs(p=>p.filter((_,j)=>j!==idx));if(editLogIdx===idx)setEditLogIdx(-1);};

  // Match helpers
  const updateMatch=(listIdx,field,val)=>setMatchList(p=>p.map((m,i)=>i===listIdx?{...m,[field]:val}:m));
  const updateEquip=(listIdx,field,val)=>setMatchList(p=>p.map((m,i)=>i===listIdx?{...m,equipment:{...m.equipment,[field]:val}}:m));
  const updateOpponentEquip=(listIdx,field,val)=>setMatchList(p=>p.map((m,i)=>i===listIdx?{...m,opponentEquip:{...(m.opponentEquip||defEquip()),[field]:val}}:m));
  const updatePartnerEquip=(listIdx,field,val)=>setMatchList(p=>p.map((m,i)=>i===listIdx?{...m,partnerEquip:{...(m.partnerEquip||defEquip()),[field]:val}}:m));
  const updateOpp2Equip=(listIdx,field,val)=>setMatchList(p=>p.map((m,i)=>i===listIdx?{...m,opponent2Equip:{...(m.opponent2Equip||defEquip()),[field]:val}}:m));
  const addGame=(listIdx)=>setMatchList(p=>p.map((m,i)=>i===listIdx?{...m,games:[...m.games,{self:0,opp:0}]}:m));
  const removeGame=(listIdx,gi)=>setMatchList(p=>p.map((m,i)=>i===listIdx?{...m,games:m.games.filter((_,j)=>j!==gi)}:m));
  const updateGame=(listIdx,gi,field,val)=>setMatchList(p=>p.map((m,i)=>i===listIdx?{...m,games:m.games.map((g,j)=>j===gi?{...g,[field]:Number(val)||0}:g)}:m));
  const addMatchSlot=()=>setMatchList(p=>[...p,emptyMatch()]);
  const removeMatchSlot=(listIdx)=>setMatchList(p=>p.filter((_,i)=>i!==listIdx));

  const saveAllMatches=()=>{
    const valid=matchList.filter(m=>m.opponent.trim());
    if(!valid.length)return;
    const entries=valid.map(m=>({...m,id:Date.now()+Math.random(),date}));
    if(editMatchIdx>=0){
      // Replace all dayMatches
      const dayIds=new Set(dayMatches.map(dm=>dm.id));
      setMatches(p=>[...p.filter(m=>!dayIds.has(m.id)),...entries]);
      setEditMatchIdx(-1);
    } else {
      setMatches(p=>[...entries,...p]);
    }
    setMatchList([emptyMatch()]);setShowForm(false);
  };
  const startEditAllDayMatches=()=>{
    if(dayMatches.length===0)return;
    setMatchList(dayMatches.map(m=>({...m,games:m.games||[{self:0,opp:0}],equipment:m.equipment||{foreRubber:"裏ソフト",backRubber:"裏ソフト",racket:""}})));
    setEditMatchIdx(0);setShowForm(true);setTab("match");
  };
  const deleteDayMatch=(idx)=>{setMatches(p=>p.filter((_,j)=>j!==idx));};

  const calcResult=(games)=>{const w=games.filter(g=>g.self>g.opp).length,l=games.filter(g=>g.self<g.opp).length;return w>l?"win":l>w?"lose":"draw";};
  const scoreStr=(games)=>games.map(g=>`${g.self}-${g.opp}`).join(" / ");
  const totalScore=(games)=>{const w=games.filter(g=>g.self>g.opp).length,l=games.filter(g=>g.self<g.opp).length;return`${w}-${l}`;};

  const dd=new Date(date+"T00:00:00");
  const weekday=["日","月","火","水","木","金","土"][dd.getDay()];
  const dayMin=dayLogs.reduce((a,l)=>a+((l.hours||0)*60+(l.minutes||0)),0);

  return(
    <div style={{maxWidth:680,margin:"0 auto",paddingTop:"env(safe-area-inset-top,0px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingTop:8}}>
        <button onClick={onBack} style={{...aBtn,fontSize:14,padding:"8px 16px",minHeight:40}}>← カレンダー</button>
        <h2 style={{margin:0,fontSize:20,fontWeight:900}}>{date}（{weekday}）</h2>
      </div>

      {/* Summary */}
      <div style={{display:"flex",gap:8,marginBottom:16}}>
        {dayLogs.length>0&&(
          <div style={{...card,padding:"10px 14px",flex:1,textAlign:"center"}}>
            <div style={{fontSize:10,color:"#64748b"}}>練習時間</div>
            <div style={{fontSize:18,fontWeight:900}}>{Math.floor(dayMin/60)}<span style={{fontSize:12,fontWeight:400}}>h</span>{dayMin%60>0&&<>{" "}{dayMin%60}<span style={{fontSize:12,fontWeight:400}}>m</span></>}</div>
          </div>
        )}
        {dayMatches.length>0&&(
          <div style={{...card,padding:"10px 14px",flex:1,textAlign:"center"}}>
            <div style={{fontSize:10,color:"#eab308"}}>試合</div>
            <div style={{fontSize:18,fontWeight:900}}>{dayMatches.filter(m=>m.result==="win").length}<span style={{fontSize:12,fontWeight:400}}>勝</span> {dayMatches.filter(m=>m.result==="lose").length}<span style={{fontSize:12,fontWeight:400}}>敗</span></div>
          </div>
        )}
      </div>

      {/* Tabs */}
      <div style={{display:"flex",gap:4,marginBottom:16}}>
        <button onClick={()=>setTab("practice")}
          style={{...bBtn,fontSize:13,padding:"7px 18px",fontWeight:700,flex:1,
            background:tab==="practice"?"rgba(34,197,94,0.3)":"rgba(255,255,255,0.06)",
            borderBottom:tab==="practice"?"2px solid #22c55e":"2px solid transparent"}}>
          📝 練習記録{dayLogs.length>0&&` (${dayLogs.length})`}
        </button>
        <button onClick={()=>setTab("match")}
          style={{...bBtn,fontSize:13,padding:"7px 18px",fontWeight:700,flex:1,
            background:tab==="match"?"rgba(234,179,8,0.2)":"rgba(255,255,255,0.06)",
            borderBottom:tab==="match"?"2px solid #eab308":"2px solid transparent"}}>
          🏆 試合記録{dayMatches.length>0&&` (${dayMatches.length})`}
        </button>
      </div>

      {/* ── Practice tab ── */}
      {tab==="practice"&&(<>
        {dayLogs.length>0&&(<div style={{marginBottom:16}}><div style={{display:"flex",flexDirection:"column",gap:8}}>
          {dayLogs.map(l=>(<div key={l.id} style={{...card,padding:14}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              <div style={{display:"flex",alignItems:"center",gap:8}}>
                <span style={{fontSize:20}}>{l.condition||"😊"}</span>
                <span style={{fontSize:13,color:"#94a3b8"}}>{l.hours||0}h {l.minutes||0}m</span>
                {l.location&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:8,background:"rgba(139,92,246,0.12)",color:"#a78bfa",border:"1px solid rgba(139,92,246,0.2)"}}>📍 {l.location}</span>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>startEditLog(l._idx)} style={{background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:6,color:"#3b82f6",fontSize:11,padding:"3px 10px",cursor:"pointer"}}>編集</button>
                <button onClick={()=>deleteLog(l._idx)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#ef4444",fontSize:11,padding:"3px 10px",cursor:"pointer"}}>削除</button>
              </div>
            </div>
            {l.content&&<div style={{fontSize:13,color:"#cbd5e1",whiteSpace:"pre-wrap",lineHeight:1.7}}>{l.content}</div>}
          </div>))}
        </div></div>)}
        <div style={{...card}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
            <div style={{fontSize:15,fontWeight:700}}>{editLogIdx>=0?"✏️ 記録を編集":"➕ 練習記録を追加"}</div>
            <button onClick={()=>setShowPresetMgr(v=>!v)} style={{...aBtn,fontSize:11,padding:"4px 10px",color:showPresetMgr?"#eab308":"#94a3b8"}}>
              ⚙️ よく使う項目
            </button>
          </div>

          {/* Preset manager */}
          {showPresetMgr&&(
            <div style={{padding:12,marginBottom:14,borderRadius:10,background:"rgba(234,179,8,0.05)",border:"1px solid rgba(234,179,8,0.15)"}}>
              <div style={{fontSize:13,fontWeight:700,color:"#eab308",marginBottom:10}}>⚙️ よく使う項目の管理</div>
              {/* Location presets */}
              <div style={{marginBottom:10}}>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>📍 練習場所</div>
                <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:6}}>
                  {presets.locations.map((loc,i)=>(
                    <span key={i} style={{display:"inline-flex",alignItems:"center",gap:4,fontSize:12,padding:"3px 10px",borderRadius:8,background:"rgba(139,92,246,0.12)",color:"#a78bfa",border:"1px solid rgba(139,92,246,0.2)"}}>
                      {loc}
                      <span onClick={()=>setPresets(p=>({...p,locations:p.locations.filter((_,j)=>j!==i)}))} style={{cursor:"pointer",fontSize:10,opacity:0.7}}>✕</span>
                    </span>
                  ))}
                  {presets.locations.length===0&&<span style={{fontSize:11,color:"#475569"}}>未登録</span>}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <input type="text" value={newLocPreset} onChange={e=>setNewLocPreset(e.target.value)}
                    style={{...inputStyle,fontSize:12,padding:"5px 8px",flex:1}} placeholder="場所を追加..."
                    onKeyDown={e=>{if(e.key==="Enter"&&newLocPreset.trim()){setPresets(p=>({...p,locations:[...p.locations,newLocPreset.trim()]}));setNewLocPreset("");}}}/>
                  <button onClick={()=>{if(newLocPreset.trim()){setPresets(p=>({...p,locations:[...p.locations,newLocPreset.trim()]}));setNewLocPreset("");}}}
                    style={{...aBtn,fontSize:11,padding:"5px 10px",color:"#a78bfa"}}>追加</button>
                </div>
              </div>
              {/* Content presets */}
              <div>
                <div style={{fontSize:12,color:"#94a3b8",marginBottom:4}}>📝 練習内容</div>
                <div style={{display:"flex",flexDirection:"column",gap:4,marginBottom:6}}>
                  {presets.contents.map((ct,i)=>(
                    <div key={i} style={{display:"flex",alignItems:"center",gap:6,fontSize:12,padding:"4px 10px",borderRadius:8,background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.15)",color:"#93c5fd"}}>
                      <span style={{flex:1,whiteSpace:"pre-wrap"}}>{ct}</span>
                      <span onClick={()=>setPresets(p=>({...p,contents:p.contents.filter((_,j)=>j!==i)}))} style={{cursor:"pointer",fontSize:10,opacity:0.7,flexShrink:0}}>✕</span>
                    </div>
                  ))}
                  {presets.contents.length===0&&<span style={{fontSize:11,color:"#475569"}}>未登録</span>}
                </div>
                <div style={{display:"flex",gap:6}}>
                  <input type="text" value={newContentPreset} onChange={e=>setNewContentPreset(e.target.value)}
                    style={{...inputStyle,fontSize:12,padding:"5px 8px",flex:1}} placeholder="練習内容を追加..."
                    onKeyDown={e=>{if(e.key==="Enter"&&newContentPreset.trim()){setPresets(p=>({...p,contents:[...p.contents,newContentPreset.trim()]}));setNewContentPreset("");}}}/>
                  <button onClick={()=>{if(newContentPreset.trim()){setPresets(p=>({...p,contents:[...p.contents,newContentPreset.trim()]}));setNewContentPreset("");}}}
                    style={{...aBtn,fontSize:11,padding:"5px 10px",color:"#93c5fd"}}>追加</button>
                </div>
              </div>
            </div>
          )}

          {/* Location field with preset chips */}
          <label style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
            <span style={{fontSize:12,color:"#94a3b8"}}>📍 練習場所</span>
            {presets.locations.length>0&&(
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:2}}>
                {presets.locations.map((loc,i)=>(
                  <button key={i} onClick={()=>setLocation(loc)}
                    style={{fontSize:11,padding:"3px 10px",borderRadius:8,cursor:"pointer",
                      background:location===loc?"rgba(139,92,246,0.3)":"rgba(255,255,255,0.04)",
                      border:location===loc?"1px solid rgba(139,92,246,0.5)":"1px solid rgba(255,255,255,0.1)",
                      color:location===loc?"#c4b5fd":"#94a3b8",fontWeight:location===loc?700:400}}>
                    {loc}
                  </button>
                ))}
              </div>
            )}
            <input type="text" value={location} onChange={e=>setLocation(e.target.value)}
              style={inputStyle} placeholder="例: ○○体育館、学校"/>
          </label>

          {/* Content field with preset chips */}
          <label style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
            <span style={{fontSize:12,color:"#94a3b8"}}>練習内容・メモ <span style={{fontSize:10,color:"#475569"}}>（任意）</span></span>
            {presets.contents.length>0&&(
              <div style={{display:"flex",gap:4,flexWrap:"wrap",marginBottom:2}}>
                {presets.contents.map((ct,i)=>(
                  <button key={i} onClick={()=>setContent(prev=>prev?(prev+"\n"+ct):ct)}
                    style={{fontSize:11,padding:"3px 10px",borderRadius:8,cursor:"pointer",
                      background:"rgba(59,130,246,0.08)",border:"1px solid rgba(59,130,246,0.15)",
                      color:"#93c5fd"}}>
                    ＋ {ct}
                  </button>
                ))}
              </div>
            )}
            <textarea value={content} onChange={e=>setContent(e.target.value)} rows={4} style={taStyle}
              placeholder={"例:\n・フォアハンドドライブの連続練習 30分\n・サーブ練習（下回転・横回転）20分\n・課題：3球目のコースが甘い"}/>
          </label>

          <div style={{display:"flex",gap:10,marginBottom:12,flexWrap:"wrap",alignItems:"flex-end"}}>
            <label style={{display:"flex",flexDirection:"column",gap:4}}>
              <span style={{fontSize:12,color:"#94a3b8"}}>練習時間</span>
              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                <select value={hours} onChange={e=>setHours(e.target.value)} style={{...inputStyle,width:64,textAlign:"center",fontSize:16,padding:"8px 4px"}}>
                  {[...Array(13)].map((_,i)=><option key={i} value={i}>{i}</option>)}
                </select>
                <span style={{fontSize:13}}>時間</span>
                <select value={minutes} onChange={e=>setMinutes(e.target.value)} style={{...inputStyle,width:64,textAlign:"center",fontSize:16,padding:"8px 4px"}}>
                  {[0,5,10,15,20,25,30,35,40,45,50,55].map(m=><option key={m} value={m}>{m}</option>)}
                </select>
                <span style={{fontSize:13}}>分</span>
              </div>
            </label>
          </div>
          <label style={{display:"flex",flexDirection:"column",gap:4,marginBottom:12}}>
            <span style={{fontSize:12,color:"#94a3b8"}}>コンディション</span>
            <div style={{display:"flex",gap:6}}>
              {["😊","🙂","😐","😓","🤕"].map(em=>(
                <button key={em} onClick={()=>setCondition(em)} style={{fontSize:24,background:condition===em?"rgba(59,130,246,0.3)":"rgba(255,255,255,0.04)",border:condition===em?"2px solid #3b82f6":"2px solid transparent",borderRadius:10,padding:"4px 8px",cursor:"pointer"}}>{em}</button>
              ))}
            </div>
          </label>
          <div style={{display:"flex",gap:8}}>
            <button onClick={addLog} style={{...aBtn,background:"rgba(34,197,94,0.3)",fontSize:14,padding:"8px 20px",fontWeight:700}}>{editLogIdx>=0?"更新":"記録する"}</button>
            {editLogIdx>=0&&<button onClick={()=>{setEditLogIdx(-1);setContent("");setLocation("");}} style={{...aBtn,fontSize:14,padding:"8px 16px"}}>キャンセル</button>}
          </div>
        </div>
      </>)}

      {/* ── Match tab ── */}
      {tab==="match"&&(<>
        {/* Saved matches for this day */}
        {dayMatches.length>0&&!showForm&&(<div style={{marginBottom:16}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:14,fontWeight:700}}>この日の試合結果</div>
            <button onClick={startEditAllDayMatches} style={{...aBtn,fontSize:11,padding:"4px 12px"}}>✏️ まとめて編集</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:8}}>
            {dayMatches.map(m=>{
              const gs=m.games||[];const rs=m.result||(gs.length?calcResult(gs):"draw");
              return(
              <div key={m.id} style={{...card,padding:14,borderLeft:`3px solid ${rs==="win"?"#22c55e":rs==="lose"?"#ef4444":"#64748b"}`}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
                    <span style={{padding:"2px 10px",borderRadius:8,fontSize:12,fontWeight:700,
                      background:rs==="win"?"rgba(34,197,94,0.2)":rs==="lose"?"rgba(239,68,68,0.2)":"rgba(148,163,184,0.2)",
                      color:rs==="win"?"#22c55e":rs==="lose"?"#ef4444":"#94a3b8"}}>
                      {rs==="win"?"勝ち":rs==="lose"?"負け":"引分"}
                    </span>
                    <span style={{fontWeight:700,fontSize:14}}>vs {m.opponent}{m.isDoubles&&m.opponent2?` / ${m.opponent2}`:""}</span>
                    {gs.length>0&&<span style={{fontSize:13,color:"#94a3b8",fontWeight:700}}>{totalScore(gs)}</span>}
                  </div>
                  <button onClick={()=>deleteDayMatch(m._idx)} style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#ef4444",fontSize:11,padding:"3px 10px",cursor:"pointer"}}>削除</button>
                </div>
                {m.isDoubles&&(<div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:4}}>
                  {m.isDoubles&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:8,background:"rgba(234,179,8,0.12)",color:"#eab308",border:"1px solid rgba(234,179,8,0.2)"}}>ダブルス</span>}
                  {m.partner&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:8,background:"rgba(34,197,94,0.12)",color:"#22c55e",border:"1px solid rgba(34,197,94,0.2)"}}>味方: {m.partner}</span>}
                </div>)}
                {gs.length>0&&<div style={{fontSize:12,color:"#64748b",marginBottom:4}}>ゲームスコア: {scoreStr(gs)}</div>}
                {(()=>{
                  const EquipBadges=({label,color,eq})=>{
                    if(!eq)return null;
                    return(
                      <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center"}}>
                        <span style={{fontSize:10,color,fontWeight:700,minWidth:28}}>{label}</span>
                        {eq.racketType&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:"rgba(255,255,255,0.06)",color:"#94a3b8"}}>{eq.racketType}</span>}
                        <span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:"rgba(59,130,246,0.12)",color:"#93c5fd"}}>F:{eq.foreRubber||"裏ソフト"}</span>
                        {(eq.backRubber||"裏ソフト")!=="なし"&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:"rgba(239,68,68,0.12)",color:"#fca5a5"}}>B:{eq.backRubber||"裏ソフト"}</span>}
                        {(eq.backRubber||"裏ソフト")==="なし"&&<span style={{fontSize:10,padding:"1px 6px",borderRadius:4,background:"rgba(255,255,255,0.06)",color:"#64748b"}}>B:なし</span>}
                      </div>
                    );
                  };
                  return(
                    <div style={{display:"flex",flexDirection:"column",gap:3,marginBottom:4}}>
                      <EquipBadges label="自分" color="#94a3b8" eq={m.equipment}/>
                      <EquipBadges label="相手" color="#f97316" eq={m.opponentEquip}/>
                      {m.isDoubles&&<EquipBadges label="味方" color="#22c55e" eq={m.partnerEquip}/>}
                      {m.isDoubles&&<EquipBadges label="相手②" color="#f97316" eq={m.opponent2Equip}/>}
                    </div>
                  );
                })()}
                {m.notes&&<div style={{fontSize:13,color:"#cbd5e1",whiteSpace:"pre-wrap",lineHeight:1.7,marginTop:4}}>{m.notes}</div>}
              </div>);
            })}
          </div>
        </div>)}

        {/* Add / Edit form */}
        {(!showForm&&dayMatches.length>0)?(
          <button onClick={()=>{setMatchList([emptyMatch()]);setEditMatchIdx(-1);setShowForm(true);}}
            style={{...card,border:"2px dashed rgba(234,179,8,0.3)",cursor:"pointer",textAlign:"center",padding:16,color:"#eab308",fontWeight:700,fontSize:14,width:"100%",background:"rgba(234,179,8,0.04)"}}>
            ➕ 試合記録を追加する
          </button>
        ):(
          <div style={{...card,borderTop:"3px solid #eab308"}}>
            <div style={{fontSize:15,fontWeight:700,marginBottom:14,color:"#eab308"}}>{editMatchIdx>=0?"✏️ 試合記録を編集":"🏆 試合記録を追加"}</div>

            {matchList.map((match,mi)=>(
              <div key={match.id} style={{padding:14,marginBottom:12,borderRadius:10,background:"rgba(234,179,8,0.04)",border:"1px solid rgba(234,179,8,0.15)"}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
                  <div style={{fontSize:13,fontWeight:700,color:"#eab308"}}>第{mi+1}試合</div>
                  {matchList.length>1&&<button onClick={()=>removeMatchSlot(mi)} style={{fontSize:11,color:"#ef4444",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,padding:"2px 8px",cursor:"pointer"}}>✕ 削除</button>}
                </div>

                {/* Singles / Doubles toggle */}
                <div style={{display:"flex",gap:6,marginBottom:10}}>
                  <button onClick={()=>updateMatch(mi,"isDoubles",false)}
                    style={{...bBtn,fontSize:12,padding:"6px 14px",fontWeight:700,flex:1,
                      background:!match.isDoubles?"rgba(234,179,8,0.3)":"rgba(255,255,255,0.06)",
                      border:!match.isDoubles?"1px solid rgba(234,179,8,0.4)":"1px solid rgba(255,255,255,0.1)"}}>
                    🏓 シングルス
                  </button>
                  <button onClick={()=>updateMatch(mi,"isDoubles",true)}
                    style={{...bBtn,fontSize:12,padding:"6px 14px",fontWeight:700,flex:1,
                      background:match.isDoubles?"rgba(234,179,8,0.3)":"rgba(255,255,255,0.06)",
                      border:match.isDoubles?"1px solid rgba(234,179,8,0.4)":"1px solid rgba(255,255,255,0.1)"}}>
                    🏓🏓 ダブルス
                  </button>
                </div>

                {/* Opponent */}
                <label style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                  <span style={{fontSize:12,color:"#94a3b8"}}>{match.isDoubles?"対戦相手①":"対戦相手"}</span>
                  <input type="text" value={match.opponent} onChange={e=>updateMatch(mi,"opponent",e.target.value)}
                    style={inputStyle} placeholder="名前 / チーム名"/>
                </label>

                {/* Doubles fields */}
                {match.isDoubles&&(<>
                  <label style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                    <span style={{fontSize:12,color:"#94a3b8"}}>対戦相手②</span>
                    <input type="text" value={match.opponent2||""} onChange={e=>updateMatch(mi,"opponent2",e.target.value)}
                      style={inputStyle} placeholder="ペアの相手"/>
                  </label>
                  <label style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
                    <span style={{fontSize:12,color:"#22c55e"}}>味方（パートナー）</span>
                    <input type="text" value={match.partner||""} onChange={e=>updateMatch(mi,"partner",e.target.value)}
                      style={{...inputStyle,borderColor:"rgba(34,197,94,0.3)"}} placeholder="自分のペア"/>
                  </label>
                </>)}

                {/* Equipment helper */}
                {(()=>{
                  const EquipBlock=({label,color,equip,onUpdate,borderColor})=>{
                    const eq=equip||defEquip();
                    return(
                      <div style={{marginBottom:10}}>
                        <span style={{fontSize:12,color,display:"block",marginBottom:4}}>{label}</span>
                        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6}}>
                          <label style={{display:"flex",flexDirection:"column",gap:3}}>
                            <span style={{fontSize:10,color:"#64748b"}}>ラケット</span>
                            <select value={eq.racketType||"シェーク"} onChange={e=>onUpdate("racketType",e.target.value)}
                              style={{...inputStyle,fontSize:11,padding:"5px 4px",...(borderColor?{borderColor}:{})}}>
                              {RACKET_TYPES.map(r=><option key={r} value={r}>{r}</option>)}
                            </select>
                          </label>
                          <label style={{display:"flex",flexDirection:"column",gap:3}}>
                            <span style={{fontSize:10,color:"#3b82f6"}}>F フォア</span>
                            <select value={eq.foreRubber||"裏ソフト"} onChange={e=>onUpdate("foreRubber",e.target.value)}
                              style={{...inputStyle,fontSize:11,padding:"5px 4px",...(borderColor?{borderColor}:{})}}>
                              {RUBBER_TYPES.map(r=><option key={r} value={r}>{r}</option>)}
                            </select>
                          </label>
                          <label style={{display:"flex",flexDirection:"column",gap:3}}>
                            <span style={{fontSize:10,color:"#ef4444"}}>B バック</span>
                            <select value={eq.backRubber||"裏ソフト"} onChange={e=>onUpdate("backRubber",e.target.value)}
                              style={{...inputStyle,fontSize:11,padding:"5px 4px",...(borderColor?{borderColor}:{})}}>
                              {RUBBER_TYPES.map(r=><option key={r} value={r}>{r}</option>)}
                            </select>
                          </label>
                        </div>
                      </div>
                    );
                  };
                  return(<>
                    <EquipBlock label="自分の用具" color="#94a3b8" equip={match.equipment} onUpdate={(f,v)=>updateEquip(mi,f,v)}/>
                    {match.isDoubles&&(
                      <EquipBlock label={`味方の用具${match.partner?` (${match.partner})`:""}`} color="#22c55e" equip={match.partnerEquip} onUpdate={(f,v)=>updatePartnerEquip(mi,f,v)} borderColor="rgba(34,197,94,0.3)"/>
                    )}
                    <EquipBlock label={`相手の用具${!match.isDoubles?"":match.opponent?` (${match.opponent})`:""}`} color="#f97316" equip={match.opponentEquip} onUpdate={(f,v)=>updateOpponentEquip(mi,f,v)} borderColor="rgba(249,115,22,0.3)"/>
                    {match.isDoubles&&(
                      <EquipBlock label={`相手②の用具${match.opponent2?` (${match.opponent2})`:""}`} color="#f97316" equip={match.opponent2Equip} onUpdate={(f,v)=>updateOpp2Equip(mi,f,v)} borderColor="rgba(249,115,22,0.3)"/>
                    )}
                  </>);
                })()}

                {/* Game scores */}
                <div style={{marginBottom:10}}>
                  <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
                    <span style={{fontSize:12,color:"#94a3b8"}}>ゲームスコア</span>
                    <button onClick={()=>addGame(mi)} style={{fontSize:11,color:"#eab308",background:"rgba(234,179,8,0.15)",border:"1px solid rgba(234,179,8,0.3)",borderRadius:6,padding:"2px 8px",cursor:"pointer"}}>＋ ゲーム追加</button>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:4}}>
                    {match.games.map((g,gi)=>(
                      <div key={gi} style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{fontSize:11,color:"#64748b",width:20,textAlign:"right"}}>{gi+1}.</span>
                        <input type="number" min={0} max={99} value={g.self} onChange={e=>updateGame(mi,gi,"self",e.target.value)}
                          style={{...inputStyle,width:48,textAlign:"center",fontSize:14,fontWeight:700,padding:"4px 6px",
                            color:g.self>g.opp?"#22c55e":g.self<g.opp?"#ef4444":"#e2e8f0"}}/>
                        <span style={{fontSize:12,color:"#64748b"}}>-</span>
                        <input type="number" min={0} max={99} value={g.opp} onChange={e=>updateGame(mi,gi,"opp",e.target.value)}
                          style={{...inputStyle,width:48,textAlign:"center",fontSize:14,fontWeight:700,padding:"4px 6px",
                            color:g.opp>g.self?"#22c55e":g.opp<g.self?"#ef4444":"#e2e8f0"}}/>
                        {match.games.length>1&&<button onClick={()=>removeGame(mi,gi)} style={{fontSize:10,color:"#64748b",background:"none",border:"none",cursor:"pointer",padding:"2px 4px"}}>✕</button>}
                        {g.self>0||g.opp>0?<span style={{fontSize:11,color:g.self>g.opp?"#22c55e":g.self<g.opp?"#ef4444":"#64748b",fontWeight:600}}>{g.self>g.opp?"WIN":g.self<g.opp?"LOSE":"DRAW"}</span>:null}
                      </div>
                    ))}
                  </div>
                  {match.games.some(g=>g.self>0||g.opp>0)&&(
                    <div style={{marginTop:6,fontSize:12,color:"#94a3b8"}}>
                      トータル: <strong style={{color:"#e2e8f0"}}>{totalScore(match.games)}</strong>
                      {" → "}
                      <span style={{fontWeight:700,color:calcResult(match.games)==="win"?"#22c55e":calcResult(match.games)==="lose"?"#ef4444":"#94a3b8"}}>
                        {calcResult(match.games)==="win"?"勝ち":calcResult(match.games)==="lose"?"負け":"引分"}
                      </span>
                    </div>
                  )}
                </div>

                {/* Notes */}
                <label style={{display:"flex",flexDirection:"column",gap:4}}>
                  <span style={{fontSize:12,color:"#94a3b8"}}>振り返り</span>
                  <textarea value={match.notes} onChange={e=>updateMatch(mi,"notes",e.target.value)} rows={3}
                    style={{...taStyle,minHeight:70}}
                    placeholder={"・良かった点\n・課題\n・次への対策"}/>
                </label>
              </div>
            ))}

            {/* Add another match */}
            <button onClick={addMatchSlot}
              style={{width:"100%",padding:10,marginBottom:12,borderRadius:8,border:"2px dashed rgba(234,179,8,0.25)",background:"rgba(234,179,8,0.03)",color:"#eab308",fontSize:13,fontWeight:700,cursor:"pointer"}}>
              ＋ もう1試合追加
            </button>

            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>{
                const updated=matchList.map(m=>{const r=m.games.some(g=>g.self>0||g.opp>0)?calcResult(m.games):m.result;return{...m,result:r};});
                setMatchList(updated);
                setTimeout(()=>{
                  const valid=updated.filter(m=>m.opponent.trim());
                  if(!valid.length)return;
                  const entries=valid.map(m=>({...m,id:Date.now()+Math.random(),date,result:m.games.some(g=>g.self>0||g.opp>0)?calcResult(m.games):m.result}));
                  if(editMatchIdx>=0){const dayIds=new Set(dayMatches.map(dm=>dm.id));setMatches(p=>[...p.filter(m=>!dayIds.has(m.id)),...entries]);}
                  else setMatches(p=>[...entries,...p]);
                  setMatchList([emptyMatch()]);setShowForm(false);setEditMatchIdx(-1);
                },0);
              }} style={{...aBtn,background:"rgba(234,179,8,0.25)",border:"1px solid rgba(234,179,8,0.4)",fontSize:14,padding:"8px 20px",fontWeight:700,color:"#eab308"}}>
                {editMatchIdx>=0?"更新":"すべて記録する"}
              </button>
              <button onClick={()=>{setMatchList([emptyMatch()]);setShowForm(dayMatches.length===0);setEditMatchIdx(-1);}} style={{...aBtn,fontSize:14,padding:"8px 16px"}}>キャンセル</button>
            </div>
          </div>
        )}
      </>)}
    </div>
  );
}

/* ════════════ DRAW PAGE ════════════ */
function DrawPage({drawings,setDrawings,memos,setMemos}){
  const courtRef=useRef(null),drawRef=useRef(null);
  const curPathRef=useRef([]),drawingRef=useRef(false),coneStartRef=useRef(null),moveRef=useRef(null);
  const [tool,setTool]=useState("pen");
  const [color,setColor]=useState("#ef4444");
  const [sw,setSw]=useState(4);
  const [editMemo,setEditMemo]=useState(null);
  const [arrows,setArrows]=useState(true);
  const [autoCorrect,setAutoCorrect]=useState(true);
  const [coneAngle,setConeAngle]=useState(40);
  const [conePrev,setConePrev]=useState(null);
  const [playerLabel,setPlayerLabel]=useState("自");
  const [showOptions,setShowOptions]=useState(false);
  const [,forceUpdate]=useState(0);

  const cones=drawings.filter(d=>d.type==="cone"),players=drawings.filter(d=>d.type==="player"),strokes=drawings.filter(d=>d.type!=="cone"&&d.type!=="player");

  const redraw=useCallback(()=>{const c=drawRef.current;if(!c)return;const ctx=c.getContext("2d");ctx.clearRect(0,0,CW,CH);cones.forEach(d=>drawCone(ctx,d));if(conePrev)drawCone(ctx,conePrev);strokes.forEach(d=>renderStroke(ctx,d,arrows));players.forEach(d=>drawPlayer(ctx,d));const live=curPathRef.current;if(live.length>=2)drawLive(ctx,live,color,sw);ctx.setLineDash([]);},[cones,strokes,players,arrows,conePrev,color,sw]);
  useEffect(()=>{const c=courtRef.current;if(!c)return;const ctx=c.getContext("2d");ctx.clearRect(0,0,CW,CH);drawCourt(ctx);},[]);
  useEffect(()=>{redraw();},[redraw]);

  const getPos=(e)=>{const r=drawRef.current.getBoundingClientRect();const ex=e.touches?e.touches[0].clientX:e.clientX;const ey=e.touches?e.touches[0].clientY:e.clientY;return{x:(ex-r.left)*CW/r.width,y:(ey-r.top)*CH/r.height};};

  const onDown=(e)=>{
    const pos=getPos(e);
    if(tool==="player"){setDrawings(p=>[...p,{type:"player",pos,color,label:playerLabel}]);return;}
    if(tool==="memo"){const id=Date.now();setMemos(p=>[...p,{id,x:pos.x,y:pos.y,text:"",color}]);setTimeout(()=>setEditMemo(id),0);return;}
    if(tool==="recolor"){const mi=findNearestMemo(pos,memos,50);if(mi>=0){setMemos(p=>p.map((m,i)=>i===mi?{...m,color}:m));return;}const di=findNearest(pos,drawings,30);if(di>=0){setDrawings(p=>p.map((d,i)=>i===di?{...d,color}:d));return;}return;}
    if(tool==="eraser"){const th=20;setDrawings(prev=>prev.filter(d=>{if(d.type==="player")return Math.hypot(d.pos.x-pos.x,d.pos.y-pos.y)>=th;if(d.type==="cone")return!inCone(pos,d);if(d.type==="line")return dSeg(pos,d.points[0],d.points[1])>=th;if(d.type==="curve")return dCrv(pos,d.points)>=th;if(d.type==="raw")return!d.points.some(p2=>Math.hypot(p2.x-pos.x,p2.y-pos.y)<th);return true;}));setMemos(p=>p.filter(m=>Math.hypot(m.x-pos.x,m.y-pos.y)>=th));return;}
    if(tool==="move"){const mi=findNearestMemo(pos,memos,80);if(mi>=0){setMemos(p=>p.map((m,i)=>i===mi?{...m,color}:m));moveRef.current={type:"memo",idx:mi,startPos:pos};drawingRef.current=true;return;}const di=findNearest(pos,drawings,30);if(di>=0){setDrawings(p=>p.map((d,i)=>i===di?{...d,color}:d));moveRef.current={type:"drawing",idx:di,startPos:pos};drawingRef.current=true;return;}return;}
    if(tool==="cone"){coneStartRef.current=pos;drawingRef.current=true;return;}
    curPathRef.current=[pos];drawingRef.current=true;
  };
  const onMove=(e)=>{if(!drawingRef.current)return;const pos=getPos(e);
    if(tool==="move"&&moveRef.current){const dx=pos.x-moveRef.current.startPos.x,dy=pos.y-moveRef.current.startPos.y;if(moveRef.current.type==="memo")setMemos(p=>p.map((m,i)=>i===moveRef.current.idx?{...m,x:m.x+dx,y:m.y+dy}:m));else setDrawings(p=>p.map((d,i)=>i===moveRef.current.idx?offsetDrawing(d,dx,dy):d));moveRef.current.startPos=pos;return;}
    if(tool==="cone"&&coneStartRef.current){setConePrev({type:"cone",origin:coneStartRef.current,target:pos,spread:coneAngle,color,opacity:0.2});return;}
    if(tool==="pen"){curPathRef.current=[...curPathRef.current,pos];const ctx=drawRef.current.getContext("2d");ctx.clearRect(0,0,CW,CH);cones.forEach(d=>drawCone(ctx,d));strokes.forEach(d=>renderStroke(ctx,d,arrows));players.forEach(d=>drawPlayer(ctx,d));drawLive(ctx,curPathRef.current,color,sw);ctx.setLineDash([]);}
  };
  const onUp=()=>{if(!drawingRef.current)return;drawingRef.current=false;
    if(tool==="move"){moveRef.current=null;return;}
    if(tool==="cone"&&coneStartRef.current){const t=conePrev?.target;if(t&&Math.hypot(t.x-coneStartRef.current.x,t.y-coneStartRef.current.y)>10)setDrawings(p=>[...p,{type:"cone",origin:coneStartRef.current,target:t,spread:coneAngle,color,opacity:0.25}]);coneStartRef.current=null;setConePrev(null);return;}
    if(tool==="pen"&&curPathRef.current.length>1){const raw=curPathRef.current;if(autoCorrect){const c=correct(raw);if(c)setDrawings(p=>[...p,{...c,color,width:sw}]);}else setDrawings(p=>[...p,{type:"raw",points:raw,color,width:sw}]);}
    curPathRef.current=[];forceUpdate(n=>n+1);
  };

  const tbBtn=(active,extra={})=>({...bBtn,padding:"8px 0",fontSize:16,width:42,height:42,textAlign:"center",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,background:active?"rgba(59,130,246,0.5)":"transparent",borderRadius:10,...extra});

  return(
    <div style={{maxWidth:900,margin:"0 auto",display:"flex",flexDirection:"column",alignItems:"center",gap:8}}>
      {/* Court - full width on mobile */}
      <div style={{width:"100%",maxWidth:650,position:"relative",borderRadius:12,overflow:"hidden",boxShadow:"0 10px 40px rgba(0,0,0,0.5)"}}>
        <div style={{position:"relative",width:"100%",paddingBottom:`${CH/CW*100}%`}}>
          <canvas ref={courtRef} width={CW} height={CH} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",zIndex:1}}/>
          <canvas ref={drawRef} width={CW} height={CH} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",zIndex:2}}/>
          {editMemo===null&&(<div onPointerDown={onDown} onPointerMove={onMove} onPointerUp={onUp} onPointerLeave={onUp} style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",zIndex:3,touchAction:"none",cursor:tool==="eraser"?"crosshair":tool==="memo"?"text":tool==="move"?"grab":tool==="cone"?"cell":tool==="recolor"?"pointer":tool==="player"?"copy":"crosshair"}}/>)}
          <div style={{position:"absolute",top:0,left:0,width:"100%",height:"100%",zIndex:4,pointerEvents:"none"}}>
            {memos.map(m=>(
              <div key={m.id} style={{position:"absolute",left:`${m.x/CW*100}%`,top:`${m.y/CH*100}%`,transform:"translate(-4px,-4px)",pointerEvents:tool==="move"?"none":"auto"}}>
                <div style={{background:"rgba(0,0,0,0.88)",backdropFilter:"blur(8px)",border:`2px solid ${m.color}`,borderRadius:8,padding:"5px 9px",minWidth:80,maxWidth:170,boxShadow:editMemo===m.id?`0 0 14px ${m.color}66`:"0 2px 8px rgba(0,0,0,0.4)"}}>
                  {editMemo===m.id?(
                    <textarea autoFocus value={m.text} onChange={e=>setMemos(p=>p.map(mm=>mm.id===m.id?{...mm,text:e.target.value}:mm))}
                      onBlur={()=>{setMemos(p=>{const c2=p.find(mm=>mm.id===m.id);if(c2&&!c2.text.trim())return p.filter(mm=>mm.id!==m.id);return p;});setEditMemo(null);}}
                      onKeyDown={e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();setMemos(p=>{const c2=p.find(mm=>mm.id===m.id);if(c2&&!c2.text.trim())return p.filter(mm=>mm.id!==m.id);return p;});setEditMemo(null);}}}
                      style={{background:"transparent",border:"none",color:m.color,fontSize:12,fontFamily:"inherit",resize:"vertical",outline:"none",width:130,minHeight:36,display:"block",lineHeight:1.5}} placeholder="メモを入力..."/>
                  ):(<div onClick={()=>{if(tool!=="move")setEditMemo(m.id);}} style={{color:m.color,fontSize:12,cursor:tool==="move"?"grab":"pointer",whiteSpace:"pre-wrap",wordBreak:"break-word",minHeight:18,lineHeight:1.5}}>{m.text||"タップして編集"}</div>)}
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* Mobile toolbar - horizontal below canvas */}
      <div style={{width:"100%",maxWidth:650}}>
        {/* Main tools row */}
        <div style={{display:"flex",gap:3,justifyContent:"center",flexWrap:"nowrap",overflowX:"auto",padding:"4px 0",WebkitOverflowScrolling:"touch"}}>
          {TOOLS.map(t=>(<button key={t.id} onClick={()=>{setTool(t.id);setEditMemo(null);}} style={tbBtn(tool===t.id)}>
            <span style={{fontSize:16}}>{t.icon}</span>
          </button>))}
          <div style={{width:1,background:"rgba(255,255,255,0.1)",margin:"4px 2px",flexShrink:0}}/>
          <button onClick={()=>setDrawings(p=>p.slice(0,-1))} style={tbBtn(false)}>↩️</button>
          <button onClick={()=>{setDrawings([]);setMemos([]);}} style={tbBtn(false)}>🗑️</button>
          <button onClick={()=>setShowOptions(v=>!v)} style={tbBtn(showOptions,{color:showOptions?"#3b82f6":"#94a3b8",fontSize:14})}>⚙️</button>
        </div>

        {/* Tool label */}
        <div style={{textAlign:"center",fontSize:11,color:"#64748b",padding:"2px 0"}}>
          {TOOLS.find(t=>t.id===tool)?.label||""}
          {tool==="player"&&` (${playerLabel})`}
        </div>

        {/* Colors row */}
        <div style={{display:"flex",gap:6,justifyContent:"center",padding:"6px 0"}}>
          {COLORS.map(c=>(<button key={c.v} onClick={()=>setColor(c.v)} style={{width:28,height:28,borderRadius:"50%",border:color===c.v?"3px solid #fff":"2px solid rgba(255,255,255,0.2)",background:c.v,cursor:"pointer",boxShadow:c.v==="#111111"?"inset 0 0 0 1px rgba(255,255,255,0.25)":"none",flexShrink:0}}/>))}
          <div style={{width:1,background:"rgba(255,255,255,0.1)",margin:"0 2px"}}/>
          {WIDTHS.map(w=>(<button key={w} onClick={()=>setSw(w)} style={{width:28,height:28,borderRadius:8,border:"none",cursor:"pointer",background:sw===w?"rgba(59,130,246,0.5)":"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}><div style={{width:w*2.5,height:w*2.5,borderRadius:"50%",background:"#e2e8f0"}}/></button>))}
        </div>

        {/* Options panel */}
        {showOptions&&(
          <div style={{display:"flex",gap:6,justifyContent:"center",flexWrap:"wrap",padding:"6px 0",background:"rgba(255,255,255,0.03)",borderRadius:10,margin:"4px 0"}}>
            <button onClick={()=>setAutoCorrect(v=>!v)} style={{...bBtn,fontSize:12,padding:"6px 14px",fontWeight:700,background:autoCorrect?"rgba(34,197,94,0.25)":"rgba(255,255,255,0.04)",border:autoCorrect?"1px solid rgba(34,197,94,0.4)":"1px solid rgba(255,255,255,0.1)"}}>{autoCorrect?"補正 ON":"補正 OFF"}</button>
            <button onClick={()=>setArrows(v=>!v)} style={{...bBtn,fontSize:12,padding:"6px 14px",fontWeight:700,background:arrows?"rgba(59,130,246,0.25)":"rgba(255,255,255,0.04)",border:arrows?"1px solid rgba(59,130,246,0.4)":"1px solid rgba(255,255,255,0.1)"}}>{arrows?"矢印 ON":"矢印 OFF"}</button>
            {tool==="cone"&&(
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                <span style={{fontSize:11,color:"#94a3b8"}}>{coneAngle}°</span>
                <input type="range" min={10} max={120} value={coneAngle} onChange={e=>setConeAngle(Number(e.target.value))} style={{width:80,accentColor:color}}/>
              </div>
            )}
            {tool==="player"&&(
              <div style={{display:"flex",gap:3}}>
                {["自","相","A","B","C","D"].map(lb=>(<button key={lb} onClick={()=>setPlayerLabel(lb)} style={{width:32,height:32,borderRadius:"50%",border:"none",cursor:"pointer",fontSize:12,fontWeight:700,background:playerLabel===lb?"rgba(59,130,246,0.5)":"rgba(255,255,255,0.08)",color:playerLabel===lb?"#fff":"#94a3b8"}}>{lb}</button>))}
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ════════════ SHARE IMAGE GENERATOR ════════════ */
function generateShareImage(title,drawings,memos,notes){
  const courtW=600,courtH=780;
  const noteW=600,pad=40,titleH=60;
  const lines=[];
  const noteText=notes||"（戦術ノートなし）";
  const maxChars=28;
  noteText.split("\n").forEach(line=>{
    if(line.length===0){lines.push("");}
    else{for(let i=0;i<line.length;i+=maxChars)lines.push(line.slice(i,i+maxChars));}
  });
  const lineH=24,noteH=Math.max(courtH,lines.length*lineH+80);
  const totalW=courtW+noteW+pad*3,totalH=Math.max(courtH+pad*2+titleH,noteH+pad*2+titleH);
  const cv=document.createElement("canvas");
  cv.width=totalW;cv.height=totalH;
  const ctx=cv.getContext("2d");
  ctx.fillStyle="#0f172a";ctx.fillRect(0,0,totalW,totalH);
  ctx.fillStyle="#1e293b";ctx.fillRect(0,0,totalW,titleH);
  ctx.fillStyle="#e2e8f0";ctx.font="bold 24px 'Noto Sans JP',sans-serif";ctx.textAlign="center";
  ctx.fillText("🏓 "+(title||"新しい戦術"),totalW/2,titleH/2+8);
  const cx=pad,cy=titleH+pad;
  ctx.save();ctx.translate(cx,cy);
  drawCourt(ctx);
  drawings.filter(d=>d.type==="cone").forEach(d=>drawCone(ctx,d));
  drawings.filter(d=>d.type!=="cone"&&d.type!=="player").forEach(d=>renderStroke(ctx,d,true));
  drawings.filter(d=>d.type==="player").forEach(d=>drawPlayer(ctx,d));
  memos.forEach(m=>{
    ctx.save();ctx.fillStyle="rgba(0,0,0,0.85)";
    const txt=m.text||"";const mLines=txt.split("\n");
    const mw=Math.min(180,Math.max(80,...mLines.map(l=>l.length*14))+20);
    const mh=mLines.length*18+14;
    ctx.beginPath();ctx.roundRect(m.x-4,m.y-4,mw,mh,6);ctx.fill();
    ctx.strokeStyle=m.color;ctx.lineWidth=2;
    ctx.beginPath();ctx.roundRect(m.x-4,m.y-4,mw,mh,6);ctx.stroke();
    ctx.fillStyle=m.color;ctx.font="12px 'Noto Sans JP',sans-serif";ctx.textAlign="left";
    mLines.forEach((l,i)=>ctx.fillText(l,m.x+6,m.y+14+i*18));
    ctx.restore();
  });
  ctx.restore();
  ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="bold 12px 'Noto Sans JP',sans-serif";ctx.textAlign="center";
  ctx.fillText("⚡ 図面",cx+courtW/2,cy-8);
  const nx=courtW+pad*2,ny=titleH+pad;
  ctx.fillStyle="rgba(255,255,255,0.3)";ctx.font="bold 12px 'Noto Sans JP',sans-serif";ctx.textAlign="center";
  ctx.fillText("📄 戦術ノート",nx+noteW/2,ny-8);
  ctx.fillStyle="rgba(255,255,255,0.05)";ctx.beginPath();ctx.roundRect(nx,ny,noteW,totalH-titleH-pad*2,10);ctx.fill();
  ctx.strokeStyle="rgba(255,255,255,0.1)";ctx.lineWidth=1;ctx.beginPath();ctx.roundRect(nx,ny,noteW,totalH-titleH-pad*2,10);ctx.stroke();
  ctx.fillStyle="#e2e8f0";ctx.font="14px 'Noto Sans JP',sans-serif";ctx.textAlign="left";
  lines.forEach((l,i)=>ctx.fillText(l,nx+20,ny+30+i*lineH));
  return cv;
}

/* ════════════ SHARE BUTTON ════════════ */
function ShareButton({title,drawings,memos,notes}){
  const [sharing,setSharing]=useState(false);
  const share=async()=>{
    setSharing(true);
    try{
      const cv=generateShareImage(title,drawings,memos,notes);
      const blob=await new Promise(r=>cv.toBlob(r,"image/png"));
      const file=new File([blob],(title||"戦術メモ")+".png",{type:"image/png"});
      if(navigator.share&&navigator.canShare&&navigator.canShare({files:[file]})){
        await navigator.share({title:title||"戦術メモ",files:[file]});
      }else{
        const url=URL.createObjectURL(blob);
        const a=document.createElement("a");a.href=url;a.download=(title||"戦術メモ")+".png";a.click();
        URL.revokeObjectURL(url);
      }
    }catch(e){if(e.name!=="AbortError")console.error(e);}
    setSharing(false);
  };
  return(
    <button onClick={share} disabled={sharing}
      style={{...aBtn,background:"rgba(59,130,246,0.2)",border:"1px solid rgba(59,130,246,0.3)",fontSize:15,padding:"12px 20px",fontWeight:700,width:"100%",minHeight:48,borderRadius:12}}>
      {sharing?"⏳ 画像を作成中...":"📤 画像で共有する"}
    </button>
  );
}

/* ════════════ SERVE ORDER ════════════ */
function ServeOrderScreen({saved,serveOrders,setServeOrders,onBack}){
  const [serveList,setServeList]=useState([]);
  const [orderTitle,setOrderTitle]=useState("");
  const [orderMemo,setOrderMemo]=useState("");
  const [currentIdx,setCurrentIdx]=useState(0);
  const [isPlaying,setIsPlaying]=useState(false);
  const [editingId,setEditingId]=useState(null);
  const [saveMsg,setSaveMsg]=useState("");
  const [view,setView]=useState("list"); // "list" | "edit" | "play"
  const thumbRefs=useRef({});

  useEffect(()=>{
    serveList.forEach(item=>{
      const cv=thumbRefs.current[item._key];
      const t=saved.find(s=>s.id===item.id);
      if(cv&&t)renderThumb(cv,t.drawings,t.memos);
    });
  },[serveList,saved]);

  const addServe=(tactic)=>setServeList(p=>[...p,{...tactic,_key:Date.now()+Math.random()}]);
  const removeServe=(idx)=>{setServeList(p=>p.filter((_,i)=>i!==idx));if(currentIdx>=serveList.length-1)setCurrentIdx(Math.max(0,serveList.length-2));};
  const moveUp=(idx)=>{if(idx<=0)return;setServeList(p=>{const n=[...p];[n[idx-1],n[idx]]=[n[idx],n[idx-1]];return n;});};
  const moveDown=(idx)=>{if(idx>=serveList.length-1)return;setServeList(p=>{const n=[...p];[n[idx],n[idx+1]]=[n[idx+1],n[idx]];return n;});};

  const saveOrder=()=>{
    if(serveList.length===0)return;
    const entry={id:editingId||Date.now(),title:orderTitle||"サーブ順",memo:orderMemo,items:serveList.map(s=>({id:s.id,title:s.title})),date:today()};
    if(editingId){setServeOrders(p=>p.map(o=>o.id===editingId?entry:o));}
    else{setServeOrders(p=>[entry,...p]);setEditingId(entry.id);}
    setSaveMsg("✅ 保存しました");setTimeout(()=>setSaveMsg(""),2000);
  };
  const loadOrder=(order)=>{
    const items=order.items.map(item=>{
      const t=saved.find(s=>s.id===item.id);
      return t?{...t,_key:Date.now()+Math.random()}:{...item,_key:Date.now()+Math.random(),drawings:[],memos:[],notes:""};
    });
    setServeList(items);setOrderTitle(order.title);setOrderMemo(order.memo||"");setEditingId(order.id);setView("edit");
  };
  const deleteOrder=(id)=>setServeOrders(p=>p.filter(o=>o.id!==id));
  const newOrder=()=>{setServeList([]);setOrderTitle("");setOrderMemo("");setEditingId(null);setView("edit");};

  const next=()=>setCurrentIdx(i=>(i+1)%serveList.length);
  const prev=()=>setCurrentIdx(i=>(i-1+serveList.length)%serveList.length);
  const currentServe=serveList[currentIdx];
  const currentTactic=currentServe?saved.find(s=>s.id===currentServe.id):null;
  const playRef=useRef(null);

  useEffect(()=>{
    if(view==="play"&&playRef.current&&currentTactic){
      renderFull(playRef.current,currentTactic.drawings,currentTactic.memos);
    }
  },[view,currentIdx,currentTactic]);

  return(
    <div style={{maxWidth:700,margin:"0 auto",paddingTop:"env(safe-area-inset-top,0px)"}}>
      <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16,paddingTop:8}}>
        <button onClick={view==="list"?onBack:()=>setView("list")} style={{...aBtn,fontSize:14,padding:"8px 16px",minHeight:40}}>← 戻る</button>
        <h2 style={{margin:0,fontSize:20,fontWeight:900}}>🎯 サーブ順管理</h2>
      </div>

      {/* ── Play mode ── */}
      {view==="play"&&serveList.length>0&&(
        <div>
          <div style={{...card,padding:0,overflow:"hidden",marginBottom:12}}>
            <div style={{padding:"10px 16px",background:"rgba(234,179,8,0.1)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <div style={{fontSize:13,color:"#eab308",fontWeight:700}}>第{currentIdx+1}サーブ / 全{serveList.length}本</div>
              <div style={{fontSize:14,fontWeight:900,color:"#e2e8f0"}}>{currentServe?.title||""}</div>
            </div>
            <canvas ref={playRef} width={400} height={520} style={{width:"100%",maxHeight:"50vh",objectFit:"contain",display:"block",background:"#0d1117"}}/>
            {currentTactic?.notes&&(
              <div style={{padding:"10px 16px",fontSize:13,color:"#cbd5e1",whiteSpace:"pre-wrap",lineHeight:1.7,maxHeight:120,overflowY:"auto",borderTop:"1px solid rgba(255,255,255,0.06)"}}>{currentTactic.notes}</div>
            )}
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"center",alignItems:"center"}}>
            <button onClick={prev} style={{...aBtn,fontSize:20,padding:"10px 18px",minHeight:44}}>◀</button>
            <div style={{textAlign:"center",minWidth:80}}>
              <div style={{fontSize:24,fontWeight:900,color:"#eab308"}}>{currentIdx+1}</div>
              <div style={{fontSize:10,color:"#64748b"}}>/ {serveList.length}</div>
            </div>
            <button onClick={next} style={{...aBtn,fontSize:20,padding:"10px 18px",minHeight:44}}>▶</button>
          </div>
          <div style={{display:"flex",gap:8,justifyContent:"center",marginTop:12}}>
            <button onClick={()=>{setCurrentIdx(0);setView("edit");}} style={{...aBtn,fontSize:13,padding:"8px 20px",background:"rgba(239,68,68,0.2)",border:"1px solid rgba(239,68,68,0.3)"}}>⏹ 終了</button>
            <button onClick={()=>setCurrentIdx(0)} style={{...aBtn,fontSize:13,padding:"8px 20px"}}>↩ 最初に戻る</button>
          </div>
        </div>
      )}

      {/* ── List mode (saved orders) ── */}
      {view==="list"&&(
        <>
          <button onClick={newOrder}
            style={{...card,border:"2px dashed rgba(234,179,8,0.3)",cursor:"pointer",textAlign:"center",padding:16,color:"#eab308",fontWeight:700,fontSize:14,width:"100%",marginBottom:16,background:"rgba(234,179,8,0.04)"}}>
            ＋ 新しいサーブ順を作成
          </button>
          {serveOrders.length===0?(
            <div style={{...card,textAlign:"center",padding:40}}>
              <div style={{fontSize:40,marginBottom:10}}>🎯</div>
              <div style={{color:"#64748b",fontSize:14}}>保存されたサーブ順はありません</div>
            </div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {serveOrders.map(order=>(
                <div key={order.id} style={{...card,padding:14}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                    <div>
                      <div style={{fontSize:15,fontWeight:700}}>{order.title}</div>
                      <div style={{fontSize:11,color:"#64748b"}}>{order.date} · {order.items.length}本</div>
                    </div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>{loadOrder(order);setCurrentIdx(0);setView("play");}}
                        style={{background:"rgba(234,179,8,0.15)",border:"1px solid rgba(234,179,8,0.3)",borderRadius:6,color:"#eab308",fontSize:11,padding:"4px 12px",cursor:"pointer",fontWeight:700}}>▶ 開始</button>
                      <button onClick={()=>loadOrder(order)}
                        style={{background:"rgba(59,130,246,0.15)",border:"1px solid rgba(59,130,246,0.3)",borderRadius:6,color:"#3b82f6",fontSize:11,padding:"4px 10px",cursor:"pointer"}}>編集</button>
                      <button onClick={()=>deleteOrder(order.id)}
                        style={{background:"rgba(239,68,68,0.15)",border:"1px solid rgba(239,68,68,0.3)",borderRadius:6,color:"#ef4444",fontSize:11,padding:"4px 10px",cursor:"pointer"}}>削除</button>
                    </div>
                  </div>
                  {order.memo&&<div style={{fontSize:12,color:"#94a3b8",whiteSpace:"pre-wrap",lineHeight:1.6}}>{order.memo}</div>}
                  <div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:6}}>
                    {order.items.map((item,i)=>(
                      <span key={i} style={{fontSize:10,padding:"2px 8px",borderRadius:6,background:"rgba(234,179,8,0.1)",color:"#eab308",border:"1px solid rgba(234,179,8,0.2)"}}>{i+1}. {item.title}</span>
                    ))}
                  </div>
                </div>
              ))}
            </div>
          )}
        </>
      )}

      {/* ── Edit mode ── */}
      {view==="edit"&&(
        <>
          {/* Title & Memo */}
          <div style={{...card,marginBottom:16}}>
            <label style={{display:"flex",flexDirection:"column",gap:4,marginBottom:10}}>
              <span style={{fontSize:12,color:"#94a3b8"}}>タイトル</span>
              <input type="text" value={orderTitle} onChange={e=>setOrderTitle(e.target.value)}
                style={inputStyle} placeholder="例: 対○○用サーブ順"/>
            </label>
            <label style={{display:"flex",flexDirection:"column",gap:4}}>
              <span style={{fontSize:12,color:"#94a3b8"}}>メモ</span>
              <textarea value={orderMemo} onChange={e=>setOrderMemo(e.target.value)} rows={2}
                style={{...taStyle,minHeight:60}}
                placeholder="例: 1本目で下回転→相手のレシーブを見て2本目を決める"/>
            </label>
          </div>

          {/* Tactic candidates */}
          <div style={{fontSize:14,fontWeight:700,marginBottom:8}}>🏓 戦術メモから追加</div>
          {saved.length===0?(
            <div style={{...card,textAlign:"center",padding:24,color:"#64748b",fontSize:13,marginBottom:16}}>戦術メモがありません。先にメモを作成してください。</div>
          ):(
            <div style={{display:"flex",flexDirection:"column",gap:6,marginBottom:16}}>
              {saved.map(t=>{
                const count=serveList.filter(s=>s.id===t.id).length;
                return(
                  <button key={t.id} onClick={()=>addServe(t)}
                    style={{...card,padding:12,display:"flex",alignItems:"center",gap:12,cursor:"pointer",border:"1px solid rgba(255,255,255,0.06)",textAlign:"left",color:"#e2e8f0",width:"100%"}}>
                    <span style={{fontSize:20}}>＋</span>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.title}</div>
                      {t.notes&&<div style={{fontSize:10,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{t.notes.slice(0,40)}</div>}
                    </div>
                    {count>0&&<span style={{fontSize:11,padding:"2px 8px",borderRadius:8,background:"rgba(234,179,8,0.15)",color:"#eab308",fontWeight:700}}>{count}回</span>}
                  </button>
                );
              })}
            </div>
          )}

          {/* Save button */}
          <button onClick={saveOrder} style={{...aBtn,background:saveMsg?"rgba(34,197,94,0.5)":"rgba(34,197,94,0.3)",fontSize:15,padding:"12px 20px",fontWeight:700,width:"100%",minHeight:48,borderRadius:12,transition:"all 0.3s",marginBottom:16}}>
            {saveMsg||"💾 サーブ順を保存"}
          </button>

          {/* Serve order list */}
          {serveList.length>0&&(
            <div style={{marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <div style={{fontSize:14,fontWeight:700}}>📋 サーブ順 ({serveList.length}本)</div>
                <button onClick={()=>{setCurrentIdx(0);setView("play");}}
                  style={{...aBtn,fontSize:13,padding:"8px 18px",fontWeight:700,background:"rgba(234,179,8,0.25)",border:"1px solid rgba(234,179,8,0.4)",color:"#eab308"}}>
                  ▶ 開始
                </button>
              </div>
              <div style={{display:"flex",flexDirection:"column",gap:6}}>
                {serveList.map((item,idx)=>(
                  <div key={item._key} style={{...card,padding:10,display:"flex",alignItems:"center",gap:10}}>
                    <div style={{fontSize:18,fontWeight:900,color:"#eab308",width:28,textAlign:"center",flexShrink:0}}>{idx+1}</div>
                    <canvas ref={el=>{if(el)thumbRefs.current[item._key]=el;}} width={120} height={156} style={{width:48,height:62,borderRadius:4,objectFit:"cover",flexShrink:0,background:"#0d1117"}}/>
                    <div style={{flex:1,minWidth:0}}>
                      <div style={{fontSize:13,fontWeight:700,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.title}</div>
                      {item.notes&&<div style={{fontSize:10,color:"#64748b",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{item.notes.slice(0,30)}</div>}
                    </div>
                    <div style={{display:"flex",flexDirection:"column",gap:2,flexShrink:0}}>
                      <button onClick={()=>moveUp(idx)} style={{fontSize:10,padding:"2px 6px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,color:"#94a3b8",cursor:"pointer"}}>▲</button>
                      <button onClick={()=>moveDown(idx)} style={{fontSize:10,padding:"2px 6px",background:"rgba(255,255,255,0.06)",border:"1px solid rgba(255,255,255,0.1)",borderRadius:4,color:"#94a3b8",cursor:"pointer"}}>▼</button>
                    </div>
                    <button onClick={()=>removeServe(idx)} style={{fontSize:10,color:"#ef4444",background:"rgba(239,68,68,0.1)",border:"1px solid rgba(239,68,68,0.2)",borderRadius:6,padding:"4px 8px",cursor:"pointer",flexShrink:0}}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </div>
  );
}

/* ════════════ NOTES PAGE ════════════ */
function NotesPage({notes,setNotes,title}){
  return(
    <div style={{maxWidth:700,margin:"0 auto"}}>
      <div style={{...card}}>
        <h2 style={{margin:"0 0 4px",fontSize:18,fontWeight:900}}>{title}</h2>
        <p style={{margin:"0 0 16px",fontSize:12,color:"#64748b"}}>戦術の詳細、ポイント、注意点などを自由に記述してください</p>
        <textarea value={notes} onChange={e=>setNotes(e.target.value)} style={taStyle} rows={12}
          placeholder={"例:\n\n【狙い】\n相手のバック側に長いサーブを出し、返球を待って3球目をフォアストレートに打ち込む\n\n【使う場面】\n・相手がバックハンドが苦手な場合\n・試合序盤の様子見\n\n【注意点】\n・サーブの長さが短くならないよう注意\n・3球目は無理に強打せずコースを突く"}/>
      </div>
      <div style={{marginTop:12,fontSize:11,color:"#475569",textAlign:"center"}}>💡 図面ページと合わせて保存されます</div>
    </div>
  );
}


function PersistentApp(){
  const [screen,setScreen]=useState("home");
  const [saved,setSaved]=usePersist(STORAGE_KEYS.saved,[]);
  const [logs,setLogs]=usePersist(STORAGE_KEYS.logs,[]);
  const [matches,setMatches]=usePersist(STORAGE_KEYS.matches,[]);
  const [presets,setPresets]=usePersist(STORAGE_KEYS.presets,{locations:[],contents:[]});
  const [equipment,setEquipment]=usePersist(STORAGE_KEYS.equipment,{racket:"",foreRubber:"",backRubber:"",foreDate:"",backDate:"",history:[]});
  const [serveOrders,setServeOrders]=usePersist("tt_serveOrders",[]);
  const [editIdx,setEditIdx]=useState(-1);
  const [title,setTitle]=useState("");
  const [drawings,setDrawings]=useState([]);
  const [memos,setMemos]=useState([]);
  const [notes,setNotes]=useState("");
  const [editorTab,setEditorTab]=useState("draw");

  const openNew=()=>{setTitle("");setDrawings([]);setMemos([]);setNotes("");setEditIdx(-1);setEditorTab("draw");setScreen("editor");};
  const openEdit=(i)=>{const t=saved[i];setTitle(t.title);setDrawings(t.drawings);setMemos(t.memos);setNotes(t.notes||"");setEditIdx(i);setEditorTab("draw");setScreen("editor");};
  const [saveMsg,setSaveMsg]=useState("");
  const saveCurrent=()=>{
    const entry={id:Date.now(),title:title||"新しい戦術",drawings:[...drawings],memos:[...memos],notes,date:today()};
    if(editIdx>=0){setSaved(p=>p.map((s,i)=>i===editIdx?entry:s));}
    else{setSaved(p=>[entry,...p]);setEditIdx(0);}
    setSaveMsg("✅ 保存しました");setTimeout(()=>setSaveMsg(""),2000);
  };
  const deleteSaved=(i)=>setSaved(p=>p.filter((_,j)=>j!==i));

  const bg={minHeight:"100vh",background:"linear-gradient(135deg,#0f172a,#1e293b,#0f172a)",fontFamily:"'Noto Sans JP','Hiragino Kaku Gothic Pro',sans-serif",color:"#e2e8f0",padding:"16px 12px"};

  return(
    <div style={bg}>
      {screen==="home"&&<HomeScreen onNew={openNew} onGallery={()=>setScreen("gallery")} onLog={()=>setScreen("log")} onEquip={()=>setScreen("equip")} saved={saved} setSaved={setSaved} logs={logs} setLogs={setLogs} matches={matches} setMatches={setMatches} presets={presets} setPresets={setPresets} equipment={equipment} setEquipment={setEquipment} serveOrders={serveOrders} setServeOrders={setServeOrders}/>}
      {screen==="gallery"&&<GalleryScreen saved={saved} onBack={()=>setScreen("home")} onOpen={openEdit} onDelete={deleteSaved} onServeOrder={()=>setScreen("serve")}/>}
      {screen==="log"&&<LogScreen logs={logs} setLogs={setLogs} matches={matches} setMatches={setMatches} presets={presets} setPresets={setPresets} onBack={()=>setScreen("home")}/>}
      {screen==="equip"&&<EquipScreen equipment={equipment} setEquipment={setEquipment} logs={logs} onBack={()=>setScreen("home")}/>}
      {screen==="serve"&&<ServeOrderScreen saved={saved} serveOrders={serveOrders} setServeOrders={setServeOrders} onBack={()=>setScreen("gallery")}/>}
      {screen==="editor"&&(
        <>
          <div style={{maxWidth:650,margin:"0 auto 6px",paddingTop:"env(safe-area-inset-top,0px)"}}>
            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}>
              <button onClick={()=>setScreen("home")} style={{...aBtn,fontSize:13,padding:"8px 14px",minHeight:40,flexShrink:0}}>← 戻る</button>
              <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="タイトルを入力" style={{...inputStyle,flex:1,fontSize:14,fontWeight:700,textAlign:"center",minWidth:0,padding:"8px 10px"}}/>
            </div>
          </div>
          <div style={{maxWidth:650,margin:"0 auto 10px",display:"flex",justifyContent:"center",gap:4}}>
            {[{id:"draw",lb:"⚡ 図面"},{id:"notes",lb:"📄 戦術ノート"}].map(pg=>(
              <button key={pg.id} onClick={()=>setEditorTab(pg.id)} style={{...bBtn,fontSize:13,padding:"6px 18px",fontWeight:700,background:editorTab===pg.id?"rgba(59,130,246,0.45)":"rgba(255,255,255,0.06)",borderBottom:editorTab===pg.id?"2px solid #3b82f6":"2px solid transparent"}}>{pg.lb}</button>
            ))}
          </div>
          {editorTab==="draw"&&<DrawPage drawings={drawings} setDrawings={setDrawings} memos={memos} setMemos={setMemos}/>}
          {editorTab==="notes"&&<NotesPage notes={notes} setNotes={setNotes} title={title}/>}
          <div style={{maxWidth:650,margin:"16px auto 0",display:"flex",flexDirection:"column",gap:8}}>
            <button onClick={saveCurrent} style={{...aBtn,background:saveMsg?"rgba(34,197,94,0.5)":"rgba(34,197,94,0.3)",fontSize:15,padding:"12px 20px",fontWeight:700,width:"100%",minHeight:48,borderRadius:12,transition:"all 0.3s"}}>{saveMsg||"💾 保存する"}</button>
            <ShareButton title={title} drawings={drawings} memos={memos} notes={notes}/>
          </div>
        </>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<PersistentApp/>);
</script>
